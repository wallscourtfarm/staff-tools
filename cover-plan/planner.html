<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Schedule — Wallscourt Farm Academy</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231798d3'/%3E%3Crect x='8' y='4' width='16' height='24' rx='2' fill='white'/%3E%3Crect x='10' y='8' width='12' height='2' rx='1' fill='%231798d3'/%3E%3Crect x='10' y='12' width='12' height='2' rx='1' fill='%23ccc'/%3E%3Crect x='10' y='16' width='12' height='2' rx='1' fill='%23ccc'/%3E%3Crect x='10' y='20' width='8' height='2' rx='1' fill='%23ccc'/%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; font-size: 13px; }

    .header-strip { background: #1798d3; height: 8px; }
    header {
      background: white; padding: 14px 20px;
      display: flex; align-items: center; gap: 15px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    header img { height: 52px; }
    .header-title { font-family:'Nunito',sans-serif; font-size:19px; font-weight:900; color:#1798d3; line-height:1.2; }
    .header-sub { font-size:12px; color:#94a3b8; margin-top:2px; }
    .demo-badge { font-size:10px; font-weight:bold; background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:.04em; margin-left:8px; vertical-align:middle; }

    /* View tabs */
    .view-tabs { margin-left:auto; display:flex; gap:6px; align-items:center; }
    .view-tab { padding:8px 16px; border:none; border-radius:5px; cursor:pointer; font-family:Arial; font-size:14px; background:#f0f8fd; color:#475569; transition:all .15s; }
    .view-tab:hover { background:#e0f0fa; }
    .view-tab.active { background:#1798d3; color:white; font-weight:bold; }
    .week-nav { display:flex; align-items:center; gap:8px; }
    .week-nav button { padding:7px 14px; border:1px solid #e2e8f0; border-radius:4px; background:white; cursor:pointer; font-size:18px; color:#475569; line-height:1; }
    .week-nav button:hover { background:#f0f8fd; border-color:#93c5fd; }
    .week-nav button:disabled { opacity:.35; cursor:default; }
    #weekLabel { font-family:'Nunito',sans-serif; font-weight:900; font-size:16px; color:#1798d3; text-align:center; min-width:160px; line-height:1.2; }
    #weekLabel small { display:block; font-size:11px; color:#94a3b8; font-weight:normal; margin-top:2px; }
    .sep { color:#e2e8f0; margin:0 10px; }

    .stats-bar { background:white; border-bottom:1px solid #e8eef4; padding:8px 20px; display:flex; align-items:center; gap:12px; font-size:12px; color:#64748b; }
    #statsContent { display:flex; gap:18px; align-items:center; margin-left:auto; }
    .stat { display:flex; align-items:center; gap:5px; }
    .stat-dot { width:7px; height:7px; border-radius:50%; }
    .stat strong { color:#1e3a8a; }

    .app { display:grid; grid-template-columns:200px 1fr 185px; gap:10px; padding:10px; max-width:1680px; margin:0 auto; align-items:start; }

    .panel { background:white; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.07); overflow:hidden; }
    .panel-hd { padding:9px 12px 7px; border-bottom:1px solid #f1f5f9; font-family:'Nunito',sans-serif; font-weight:900; font-size:13px; color:#1e3a8a; }
    .panel-hd small { display:block; font-size:10px; color:#94a3b8; font-weight:normal; font-family:Arial; margin-top:1px; }
    .panel-body { padding:9px 10px; max-height:calc(100vh - 130px); overflow-y:auto; }
    .section-label { font-size:9.5px; text-transform:uppercase; letter-spacing:.08em; color:#64748b; font-weight:bold; margin:10px 0 6px; }
    .section-label:first-child { margin-top:0; }

    /* Teacher chips — two-row (name always visible, ents below) */
    .teacher-chip { display:flex; flex-direction:column; gap:3px; padding:6px 9px; border:1.5px solid #e2e8f0; border-radius:5px; margin-bottom:4px; cursor:grab; user-select:none; transition:all .12s; background:white; touch-action:none; }
    .teacher-chip:hover { border-color:#1798d3; box-shadow:0 2px 6px rgba(23,152,211,.15); transform:translateY(-1px); }
    .teacher-chip.dragging { opacity:.28; pointer-events:none; }
    .chip-row1 { display:flex; align-items:center; gap:9px; }
    .chip-row2 { display:flex; align-items:center; gap:7px; padding-left:19px; flex-wrap:wrap; }
    .yg-pip { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
    .chip-name { font-size:12px; font-weight:bold; color:#111; flex:1; }
    .chip-done { width:16px; height:16px; border-radius:50%; background:#22c55e; color:white; font-size:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:bold; }
    .chip-ent-item { display:flex; align-items:center; gap:2px; font-size:9px; color:#64748b; white-space:nowrap; }
    .reason-popup { position:fixed; background:white; border:2px solid #1798d3; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.15); z-index:10000; padding:8px 0; min-width:140px; }
    .reason-popup-item { padding:8px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .reason-popup-item:hover { background:#f0f9ff; }
    .reason-popup-item.selected { background:#1798d3; color:white; }
    .ent-mini { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .ent-mini.used  { background:#1798d3; }
    .ent-mini.empty { background:#e2e8f0; border:1px solid #cbd5e1; }
    .ent-mini.over  { background:#dc2626; }

    /* Cover chips */
    .cover-chip { display:flex; align-items:center; gap:7px; padding:5px 8px; border:1.5px solid #e2e8f0; border-radius:5px; margin-bottom:4px; cursor:grab; user-select:none; transition:all .12s; background:white; touch-action:none; }
    .cover-chip:hover { border-color:#1798d3; box-shadow:0 2px 6px rgba(23,152,211,.15); transform:translateY(-1px); }
    .cover-chip.dragging { opacity:.28; pointer-events:none; }
    .cover-avatar { width:22px; height:22px; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-size:8.5px; font-weight:bold; flex-shrink:0; }
    .cover-chip-name { font-size:12px; font-weight:bold; color:#111; }
    .cover-chip-role { font-size:9.5px; color:#94a3b8; }

    /* Grid */
    .grid-wrap { position:relative; background:white; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.07); overflow-x:auto; }
    .span-strips { position:absolute; top:0; left:55px; right:0; bottom:0; pointer-events:none; z-index:5; }
    .span-strips .slot-item { pointer-events:auto; }
    .week-grid { width:100%; border-collapse:collapse; min-width:620px; table-layout:fixed; }
    .week-grid th { padding:8px 6px; text-align:center; font-size:12px; font-weight:900; font-family:'Nunito',sans-serif; color:#1798d3; border-bottom:2px solid #d1d5db; border-right:1px solid #d1d5db; }
    .week-grid th.is-today { background:#1798d3; color:white; }
    .week-grid th:first-child { width:55px; color:#1798d3; border-right:2px solid #d1d5db; font-weight:900; font-family:'Nunito',sans-serif; }
    .session-cell { font-size:9px; font-weight:900; font-family:'Nunito',sans-serif; color:#1798d3; text-transform:uppercase; letter-spacing:.05em; text-align:center; vertical-align:middle; padding:6px 4px; border-right:2px solid #d1d5db; border-bottom:1px solid #d1d5db; white-space:normal; line-height:1.3; }

    /* Present / share mode — grid only, no side panels */
    body.present-mode .app > .panel { display:none; }
    body.present-mode .app { grid-template-columns:1fr; }
    body.present-mode .header-sub { display:none; }
    body.present-mode .stats-bar { font-size:12px; }
    body.present-mode .week-grid th, body.present-mode .week-grid td { font-size:12px; }
    body.present-mode .slot-item { font-size:12px; }
    body.present-mode .slot-name { font-size:12.5px; }
    /* Row heights - taller for AM/PM teaching sessions */
    .srow-before, .srow-after { height:40px; }
    .srow-lunch { height:50px; }
    .srow-am, .srow-pm { height:250px; }
    .grid-cell { vertical-align:top; padding:5px; border-right:1px solid #d1d5db; border-bottom:1px solid #d1d5db; min-width:115px; transition:background .1s; position:relative; }
    .slots-row { position:absolute; top:5px; bottom:5px; left:5px; right:5px; display:flex; gap:3px; align-items:stretch; }
    .grid-cell.teacher-ready { background:#f8faff; }
    .grid-cell.teacher-over  { background:#dbeafe !important; outline:2px dashed #1798d3; outline-offset:-2px; }
    .grid-cell.slot-over     { background:#eff6ff !important; outline:2px dashed #60a5fa; outline-offset:-2px; }
    .grid-cell.cover-ready .slot-cover-zone { border-color:#93c5fd !important; background:#f0f8fd !important; color:#1798d3 !important; animation:pulse-zone 1.2s ease-in-out infinite; }
    .grid-cell.cover-over   .slot-cover-zone { border-color:#1798d3 !important; background:#bfdbfe !important; animation:none; }
    @keyframes pulse-zone { 0%,100%{border-color:#93c5fd} 50%{border-color:#1798d3} }
    .empty-hint { display:flex; align-items:center; justify-content:center; min-height:40px; color:#e2e8f0; font-size:20px; border-radius:4px; border:1.5px dashed transparent; transition:all .1s; }
    .grid-cell.teacher-over .empty-hint,.grid-cell.slot-over .empty-hint { color:#1798d3; border-color:#1798d3; }

    /* Slot items — vertical text layout for narrow columns */
    .slots-row { display:flex; gap:3px; align-items:stretch; }
    .slots-row > .slot-item { display:flex; flex-direction:column; width:32px; flex-shrink:0; }
    .slots-row > .slot-item > .slot-content { flex:1; width:32px; }
    .span-strips .slot-item { min-width:32px; width:32px; }
    .span-strips .slot-content { height:100%; width:32px; }
    .slot-item { position:relative; min-width:32px; font-size:12px; }
    .slot-item.slot-dragging { opacity:.3; }
    .slot-strip { display:none; } /* No longer used - color is now on content border-left */
    .slot-content { position:relative; z-index:2; border:1.5px solid #e2e8f0; border-left-width:4px; border-left-style:solid; border-radius:4px; overflow:hidden; background:white; cursor:grab; touch-action:none; user-select:none; min-height:50px; display:flex; flex-direction:column; }
    .slot-content:active { cursor:grabbing; }
    .slot-text { writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg); padding:6px 3px; flex:1; white-space:nowrap; overflow:hidden; text-align:center; }
    .slot-text > * { display:inline; }
    .slot-gap { display:inline-block; height:12px; }
    .slot-name { font-weight:700; color:#111; font-size:14px; white-space:nowrap; }
    .slot-reason { font-size:11px; color:#334155; font-weight:600; white-space:nowrap; }
    .slot-cover-name { font-size:11px; color:#166534; font-weight:700; white-space:nowrap; }
    .slot-cover-x { font-size:11px; color:#94a3b8; cursor:pointer; margin-left:3px; }
    .slot-cover-x:hover { color:#dc2626; }
    .slot-avatar { display:inline-flex; align-items:center; justify-content:center; width:14px; height:14px; border-radius:50%; color:white; font-size:6px; font-weight:bold; vertical-align:middle; margin-right:4px; }
    .slot-controls { display:flex; flex-direction:column; gap:2px; padding:3px 2px; border-top:1px solid rgba(0,0,0,.07); }
    .slot-del { position:absolute; top:2px; right:2px; background:white; border:1px solid #e2e8f0; border-radius:2px; cursor:pointer; color:#cbd5e1; font-size:10px; width:14px; height:14px; display:flex; align-items:center; justify-content:center; z-index:10; }
    .slot-del:hover { color:#dc2626; border-color:#dc2626; }
    .slot-cover-zone { padding:3px; font-size:8px; color:#94a3b8; text-align:center; cursor:default; border-top:1px dashed #e2e8f0; }
    .slot-cover-zone.over { border-color:#1798d3 !important; background:#bfdbfe !important; }
    .nocover-slot .slot-content { border-color:#cbd5e1 !important; background:#f8fafc; }

    /* Extend handle - positioned at bottom of content */
    .slot-extend { position:absolute; bottom:-2px; left:0; right:0; height:8px; cursor:ns-resize; background:linear-gradient(to bottom, rgba(23,152,211,.2), rgba(23,152,211,.5)); opacity:.6; transition:opacity .12s; z-index:10; }
    .slot-content:hover .slot-extend { opacity:1; }
    .slot-extend:hover { background:linear-gradient(to bottom, rgba(23,152,211,.4), rgba(23,152,211,.8)); }

    /* Cover load panel */
    .cover-load-row { display:flex; align-items:center; gap:7px; padding:5px 0; border-bottom:1px solid #f8fafc; }
    .cover-load-row:last-child { border-bottom:none; }
    .cover-load-avatar { width:22px; height:22px; border-radius:50%; color:white; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:bold; flex-shrink:0; }
    .cover-load-name { font-size:11.5px; font-weight:bold; color:#111; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cover-load-pips { display:flex; gap:3px; flex-wrap:wrap; }
    .cover-load-pip { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .cover-chip-count { font-size:12px; font-weight:bold; color:#1798d3; background:#e0f2fe; border-radius:8px; padding:1px 7px; margin-left:auto; min-width:22px; text-align:center; }

    /* YG tints for slot content */
    .syg-Reception .slot-content{border-color:#93c5fd} .syg-Y1 .slot-content{border-color:#fb923c} .syg-Y2 .slot-content{border-color:#6ee7b7}
    .syg-Y3 .slot-content{border-color:#f9a8d4} .syg-Y4 .slot-content{border-color:#60a5fa} .syg-Y5 .slot-content{border-color:#fdba74} .syg-Y6 .slot-content{border-color:#4ade80}

    /* Pips (for teacher chips) */
    .pip-Reception,.dot-Reception{background:#93c5fd} .pip-Y1,.dot-Y1{background:#fb923c} .pip-Y2,.dot-Y2{background:#6ee7b7}
    .pip-Y3,.dot-Y3{background:#f9a8d4} .pip-Y4,.dot-Y4{background:#60a5fa} .pip-Y5,.dot-Y5{background:#fdba74} .pip-Y6,.dot-Y6{background:#4ade80}
    .pip-,.dot-{background:#cbd5e1}

    /* Reason colours (for reference) */
    .rb-PPA{background:#dbeafe;color:#1e40af} .rb-Phase{background:#fce7f3;color:#9d174d} .rb-Leadership{background:#fef3c7;color:#92400e}
    .rb-Training{background:#ede9fe;color:#5b21b6} .rb-ECT1{background:#fef9c3;color:#713f12} .rb-ECT2{background:#fefce8;color:#854d0e}
    .rb-RA{background:#e0e7ff;color:#3730a3} .rb-SENCO{background:#f0f9ff;color:#0c4a6e} .rb-Illness{background:#fee2e2;color:#991b1b}
    .rb-Sports{background:#ccfbf1;color:#0f766e} .rb-Other{background:#f3f4f6;color:#374151}

    /* Cover load (within staff panel) */
    .cover-load-section { margin-top:4px; border-top:1px solid #f1f5f9; padding-top:8px; }

    /* My view */
    .my-view-wrap { background:white; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,.07); padding:18px 20px; }
    .my-name-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; padding:11px 14px; background:#f8fafc; border-radius:6px; border:1px solid #e2e8f0; }
    .my-name-row label { font-size:13px; color:#475569; font-weight:bold; flex-shrink:0; }
    .my-name-row select { padding:6px 10px; font-size:14px; border:1px solid #cbd5e1; border-radius:4px; color:#1e293b; background:white; flex:1; max-width:240px; }
    .my-week-group { margin-bottom:22px; }
    .my-week-label { font-size:13px; font-weight:bold; color:#1e3a8a; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .my-week-label .wk-badge { font-size:11px; background:#f0f4ff; color:#1e3a8a; padding:1px 8px; border-radius:4px; }
    .my-entry { display:flex; gap:12px; padding:10px 13px; border-radius:5px; border-left:4px solid #e2e8f0; border:1px solid #e2e8f0; margin-bottom:7px; border-left-width:4px; }
    .my-badge { font-size:10px; font-weight:bold; padding:2px 7px; border-radius:3px; letter-spacing:.02em; flex-shrink:0; align-self:flex-start; margin-top:1px; }
    .my-badge.out { background:#ffedd5; color:#c2410c; }
    .my-badge.covering { background:#dbeafe; color:#1d4ed8; }
    .my-entry-detail { flex:1; }
    .my-entry-when { font-size:13px; color:#111; margin-bottom:3px; }
    .my-entry-info { font-size:12px; color:#555; }
    .my-entry-cover { font-size:12px; color:#1a1a8c; margin-top:2px; }
    .my-empty { text-align:center; padding:30px 0; color:#94a3b8; font-size:14px; }

    footer { text-align:center; font-size:11px; color:#cbd5e1; padding:14px 0 22px; }

    /* Event-blocked days */
    .event-day-header { color:#dc2626; font-size:10px; font-weight:bold; margin-top:2px; letter-spacing:.01em; }
    .event-day-header.inset { color:#b45309; }
    .grid-cell.event-blocked {
      background: repeating-linear-gradient(-45deg, #fef2f2 0, #fef2f2 4px, #fff8f8 4px, #fff8f8 9px) !important;
      cursor:not-allowed;
    }
    .grid-cell.event-blocked.inset {
      background: repeating-linear-gradient(-45deg, #fffbeb 0, #fffbeb 4px, #fffff5 4px, #fffff5 9px) !important;
    }
    .event-cell-label { text-align:center; padding:4px; font-size:9.5px; font-weight:bold; color:#fca5a5; letter-spacing:.03em; }
    .event-cell-label.inset { color:#fcd34d; }

    /* Day reset button */
    .day-reset-btn { position:absolute; top:4px; right:4px; background:none; border:none; cursor:pointer; color:#cbd5e1; font-size:10px; padding:1px 3px; border-radius:2px; line-height:1; }
    .day-reset-btn:hover { color:#dc2626; background:#fee2e2; }

    /* Whole-school session banners (vertical strips for tall rows, horizontal for short rows) */
    .session-banner { display:flex; align-items:center; justify-content:center; gap:5px; padding:5px 7px; border-radius:4px; font-size:10.5px; font-weight:bold; margin-bottom:4px; text-align:center; }
    .event-strip { position:absolute; top:5px; bottom:5px; left:5px; width:20px; display:flex; flex-direction:column; z-index:1; }
    .event-strip-content { flex:1; display:flex; align-items:center; justify-content:center; border-radius:4px; overflow:hidden; cursor:default; }
    .event-strip-text { writing-mode:vertical-rl; text-orientation:mixed; transform:rotate(180deg); padding:4px 2px; font-size:10px; font-weight:bold; white-space:nowrap; text-align:center; }
    .cell-note { display:flex; align-items:center; gap:5px; padding:4px 7px; background:#1e293b; border-radius:4px; font-size:10.5px; color:white; font-weight:bold; margin-bottom:4px; }
    .cell-note .note-del { margin-left:auto; background:none; border:none; cursor:pointer; color:rgba(255,255,255,.4); font-size:12px; padding:0 1px; border-radius:2px; }
    .cell-note .note-del:hover { color:white; background:rgba(255,255,255,.15); }

    /* Action buttons */
    .action-btn { padding:3px 10px; border:1px solid #e2e8f0; border-radius:4px; background:white; cursor:pointer; font-size:11px; color:#475569; transition:all .12s; }
    .action-btn:hover:not(:disabled) { border-color:#1798d3; color:#1798d3; }
    .action-btn.danger:hover { border-color:#dc2626 !important; color:#dc2626 !important; }
    .action-btn:disabled { opacity:.4; cursor:default; }

    /* Whole-school events manager modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:flex; align-items:center; justify-content:center; }
    .modal-overlay.hidden { display:none; }
    .modal { background:white; border-radius:10px; padding:22px 24px; width:460px; max-width:94vw; box-shadow:0 12px 40px rgba(0,0,0,.25); }
    .modal-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .modal-hd h2 { font-family:'Nunito',sans-serif; font-size:16px; font-weight:900; color:#1e3a8a; margin:0; }
    .modal-hd button { background:none; border:none; cursor:pointer; font-size:20px; color:#94a3b8; line-height:1; padding:0; }
    .modal-hd button:hover { color:#1e293b; }
    .ws-list { margin-bottom:14px; }
    .ws-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid #f1f5f9; }
    .ws-row:last-child { border-bottom:none; }
    .ws-swatch { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
    .ws-info { flex:1; font-size:12px; }
    .ws-info strong { display:block; color:#111; }
    .ws-info span { color:#94a3b8; font-size:10.5px; }
    .ws-del { background:none; border:none; cursor:pointer; color:#cbd5e1; font-size:14px; padding:2px 4px; border-radius:3px; }
    .ws-del:hover { color:#dc2626; background:#fee2e2; }
    .ws-add-form { background:#f8fafc; border-radius:6px; padding:12px; border:1px solid #e2e8f0; }
    .ws-add-form h3 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:#64748b; font-weight:bold; margin:0 0 10px; }
    .ws-add-row { display:flex; gap:7px; align-items:flex-end; flex-wrap:wrap; }
    .ws-add-row label { font-size:11px; color:#475569; }

<script>
// ── Constants ─────────────────────────────────────────────────────────────────

const SESSIONS      = ['Before School','AM','Lunch','PM','After School'];
const SESSION_IDX   = { 'Before School': 0, 'AM': 1, 'Lunch': 2, 'PM': 3, 'After School': 4 };
const OFF_ALLOC     = new Set(['Before School','Lunch','After School']);
const SESSION_SHORT = {'Before School':'Before School',AM:'AM',Lunch:'Lunch',PM:'PM','After School':'After School'};
const DAYS          = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const DAY_IDX       = {Monday:0,Tuesday:1,Wednesday:2,Thursday:3,Friday:4};
const REASONS       = ['PPA','Phase Lead','Leadership','Training','ECT','ECT1','ECT2','RA','SENCO','Sports','Illness','Other'];
const REASON_CLS    = {'PPA':'PPA','Phase Lead':'Phase','Leadership':'Leadership','Training':'Training',
                       'ECT':'ECT1','ECT1':'ECT1','ECT2':'ECT2','RA':'RA','SENCO':'SENCO','Sports':'Sports','Illness':'Illness','Other':'Other'};
const COUNTED_SESSIONS = new Set(['Before School','AM','Lunch','PM','After School']);
const BLOCKING_TYPES   = new Set(['Half Term','Christmas','Easter','Summer Holiday','INSET','CLF Conference','Bank Holiday']);

// ── Sheet config ──────────────────────────────────────────────────────────────
const SHEET_ID   = '1XsP5yEGnf8sJyXk8iEXqHEtw-NtCsMUFZLaHW4TWNhw';
const SHEET_BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=`;
const SYNC_URL   = 'https://script.google.com/macros/s/AKfycbx6CThsZIBj9pxc0noGkgUMaCHTKgUBASm5-wQCIQ6JELoQ4abIctjlpEGPyE_jrlzR/exec';
const NOTIFY_URL = 'https://script.google.com/macros/s/AKfycbwDU17blfDTXR5d8z1UmpSUsUoUUY3HD4G1nmF4eS4xXV91HoOfZpC-NwPNFkXLczTY/exec';

// ── Mutable data (populated by init) ─────────────────────────────────────────
let WEEKS    = [];
let TEACHERS = [];
let COVER    = [];
let EVENTS             = {};  // YYYY-MM-DD → {label,type:'bank-holiday'|'inset'}  — blocking
let INFO_EVENTS        = {};  // YYYY-MM-DD → [{label,type}]                       — day header banners
let SESSION_INFO_EVENTS= {};  // 'YYYY-MM-DD|Session' → [{label,type}]             — cell banners
let RECURRING_SLOTS  = [];   // master copy of recurring, used to seed new weeks

// ── Whole-school events (localStorage-backed; defaults loaded from sheet) ─────
let WS_SHEET_DEFAULTS = [];
function wsLoad() {
  try { const s = localStorage.getItem('wfa_ws_events'); return s ? JSON.parse(s) : WS_SHEET_DEFAULTS; }
  catch(e) { return WS_SHEET_DEFAULTS; }
}
function wsSave() { localStorage.setItem('wfa_ws_events', JSON.stringify(wsEvents)); }
let wsEvents = [];

// ── Edit mode ─────────────────────────────────────────────────────────────────
let editMode = localStorage.getItem('wfa_edit_mode') === '1';
function applyEditMode() {
  document.body.classList.toggle('edit-locked', !editMode);
  const btn = document.getElementById('editToggleBtn');
  if (btn) {
    btn.textContent = editMode ? '🔓 Editing' : '🔒 View only';
    btn.classList.toggle('unlocked', editMode);
  }
}
function toggleEditMode() {
  editMode = !editMode;
  localStorage.setItem('wfa_edit_mode', editMode ? '1' : '0');
  applyEditMode();
}

// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  weekIdx:   0,
  weekSlots: {},
  dragging:  null,
  nextId:    200,
  view:      'week',
  myName:    '',
  cellNotes: {},
  pendingDrop: null, // { tid, dayIdx, session } waiting for reason selection
  changeLog: [],     // tracks mutations for notification
};

// ── Colour helpers ────────────────────────────────────────────────────────────
function contrastColor(hex) {
  // Returns '#000000' or '#ffffff' — whichever is more readable on the given background.
  // Uses WCAG relative luminance formula.
  const c = hex.replace('#','');
  const r = parseInt(c.slice(0,2),16)/255;
  const g = parseInt(c.slice(2,4),16)/255;
  const b = parseInt(c.slice(4,6),16)/255;
  const toLinear = x => x<=0.04045 ? x/12.92 : Math.pow((x+0.055)/1.055,2.4);
  const L = 0.2126*toLinear(r) + 0.7152*toLinear(g) + 0.0722*toLinear(b);
  return L > 0.179 ? '#000000' : '#ffffff';
}

// ── CSV / Sheet helpers ───────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = []; let inQ=false, cur='', cells=[];
  for (let i=0; i<text.length; i++) {
    const c=text[i];
    if (c==='"') { inQ=!inQ; }
    else if (c===',' && !inQ) { cells.push(cur.trim()); cur=''; }
    else if ((c==='\n'||c==='\r') && !inQ) {
      cells.push(cur.trim()); cur='';
      if (cells.some(x=>x)) rows.push(cells);
      cells=[];
      if (c==='\r' && text[i+1]==='\n') i++;
    } else cur+=c;
  }
  cells.push(cur.trim());
  if (cells.some(x=>x)) rows.push(cells);
  return rows;
}
function csvToObjects(text) {
  text = text.replace(/^\ufeff/, ''); // strip UTF-8 BOM if present
  const rows=parseCSV(text);
  if (rows.length<2) return [];
  const firstRow=rows[0];

  // Detect gviz combined format: first row has cells like "ColumnName Value"
  // or "ColumnName " (header + space + data value merged into one cell).
  // Signature: every cell matches /^[A-Za-z]\w*( .*)?$/ AND at least one has a value.
  // Detect gviz combined format: "ColumnName Value" in first row.
  // Empty cells (blank trailing columns) are ignored in the check.
  const gvizRe=/^([A-Za-z]\w*)( .*)?$/;
  const nonEmpty = firstRow.filter(h=>h.length>0);
  const isGviz = nonEmpty.every(h=>gvizRe.test(h))
    && nonEmpty.some(h=>{ const m=h.match(gvizRe); return m&&m[2]&&m[2].trim(); });

  let headers, dataRows;
  if (isGviz) {
    headers  = firstRow.map(h=>{ const m=h.match(gvizRe); return m?m[1]:h; });
    const firstData = firstRow.map(h=>{ const m=h.match(gvizRe); return m&&m[2]?m[2].trim():''; });
    dataRows = [firstData, ...rows.slice(1)];
  } else {
    headers  = firstRow;
    dataRows = rows.slice(1);
  }

  return dataRows.map(r=>{
    const obj={};
    headers.forEach((h,i)=>{ if(h) obj[h]=(r[i]||'').trim(); });
    return obj;
  });
}
function parseDateStr(str) {
  if (!str) return null;
  const p=str.split('/');
  if (p.length!==3) return null;
  const [d,m,y]=p.map(Number);
  return new Date(y<100?2000+y:y, m-1, d);
}
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── Data builders ─────────────────────────────────────────────────────────────
function buildStaff(rows) {
  const teachers=[], cover=[];
  rows.forEach(r=>{
    if (!r.Name) return;
    const id=r.Name.toLowerCase().replace(/[^a-z0-9]+/g,'_');
    const isLeader=['Principal','Vice Principal','Assistant Principal'].includes(r.Role);
    const isInfoOnly=r.Role!=='Class' && ['Principal','Vice Principal','Assistant Principal',
      'Phase','Phase Lead','SENCO'].includes(r.Role);
    const ent=[];
    for (let i=1;i<=4;i++) {
      const nm=r[`Ent${i}`], n=parseInt(r[`Ent${i}Sessions`])||0;
      const freq=(r[`Ent${i}Freq`]||'weekly').toLowerCase();
      if (nm&&n>0) ent.push({r:nm,n,freq});
    }
    const workingDays=r.WorkingDays
      ? r.WorkingDays.split(',').map(d=>parseInt(d.trim())-1).filter(d=>d>=0&&d<=4)
      : null;
    // Normalise YR → Reception so CSS pip/syg classes match
    const yg = r.YearGroup === 'YR' ? 'Reception' : (r.YearGroup || null);
    // Left panel: Class teachers + non-class staff who have scheduled time (Phase, SENCO, SLT)
    const LEFT_ROLES = new Set(['Class','Phase','Phase Lead','SENCO','Principal','Vice Principal','Assistant Principal']);
    if (LEFT_ROLES.has(r.Role)) {
      const t={id,name:r.Name,yg,role:r.Role,ent,workingDays,isLeader,isInfoOnly,email:r.Email||''};
      if (isLeader) t.reasons=['Meeting','External Visit','Training','Conference'];
      teachers.push(t);
    }
    if (r.CoverRole) {
      cover.push({id:'c_'+id, name:r.Name, role:r.CoverRole,
        init:r.Initials||r.Name.slice(0,2).toUpperCase(), col:r.Colour||'#94a3b8',
        order: r.Order !== '' && r.Order !== undefined ? parseInt(r.Order) : Infinity,
        email:r.Email||''});
    }
  });
  cover.sort((a,b) => a.order - b.order);
  const YG_ORDER  = ['Reception','Y1','Y2','Y3','Y4','Y5','Y6'];
  const SLT_ROLES = new Set(['Principal','Vice Principal','Assistant Principal']);
  teachers.sort((a,b) => {
    // Class teachers first, then non-class based
    if (a.isInfoOnly && !b.isInfoOnly) return 1;
    if (!a.isInfoOnly && b.isInfoOnly) return -1;
    if (a.isInfoOnly && b.isInfoOnly) {
      // Within non-class based: Phase/SENCO (have entitlements) before SLT
      const aIsSLT = SLT_ROLES.has(a.role)||a.isLeader, bIsSLT = SLT_ROLES.has(b.role)||b.isLeader;
      if (aIsSLT && !bIsSLT) return 1;
      if (!aIsSLT && bIsSLT) return -1;
    }
    return (YG_ORDER.indexOf(a.yg) === -1 ? 99 : YG_ORDER.indexOf(a.yg))
         - (YG_ORDER.indexOf(b.yg) === -1 ? 99 : YG_ORDER.indexOf(b.yg));
  });
  return {teachers,cover};
}
function buildWeeks(rows) {
  return rows.map(r=>{
    const start=parseDateStr(r.StartDate);
    if (!start||isNaN(start)) return null;
    return {label:`Term ${r.Term}  Week ${r.Week}`, shortLabel:r.Label, term:+r.Term, week:+r.Week, start};
  }).filter(Boolean);
}
function buildEvents(rows) {
  const blocking={}, info={}, sessionInfo={};
  rows.forEach(r=>{
    if (!r.StartDate) return;
    const start=parseDateStr(r.StartDate), end=parseDateStr(r.EndDate||r.StartDate);
    if (!start||!end) return;
    const isBlock=BLOCKING_TYPES.has(r.Type);
    const btype=(r.Type==='INSET'||r.Type==='CLF Conference')?'inset':'bank-holiday';
    const cur=new Date(start);
    while (cur<=end) {
      const k=dateKey(cur);
      if (isBlock) {
        blocking[k]={label:r.Label||r.Type, type:btype};
      } else {
        const lbl=r.Type+(r.Label&&r.Label!==r.Type?' · '+r.Label:'');
        if (r.Session) {
          const sk=`${k}|${r.Session}`;
          if (!sessionInfo[sk]) sessionInfo[sk]=[];
          sessionInfo[sk].push({label:r.Label||r.Type, type:r.Type, bg:r.Colour||'#1e3a8a'});
        } else {
          if (!info[k]) info[k]=[];
          info[k].push({label:lbl, type:r.Type});
        }
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  return {blocking,info,sessionInfo};
}
function buildSchoolEvents(rows) {
  return rows.map(r=>({
    day:DAY_IDX[r.Day]??0, session:r.Session, label:r.Label, bg:r.Colour||'#1e3a8a'
  })).filter(e=>e.label);
}
function buildRecurring(rows) {
  const YG_CODES = new Set(['Reception','YR','Y1','Y2','Y3','Y4','Y5','Y6']);
  const result=[]; let id=1;
  rows.forEach(r=>{
    if (!r.Teacher||!r.Day||!r.Session) return;
    const dayIdx=DAY_IDX[r.Day];
    if (dayIdx===undefined) return;
    const reason=r.Reason||'Other';
    const session = r.Session;
    const endSession = r.EndSession || session; // Support spans from sheet
    // Year group shorthand — expand to all class teachers in that group
    if (YG_CODES.has(r.Teacher)) {
      const yg = r.Teacher==='YR' ? 'Reception' : r.Teacher;
      TEACHERS.filter(t=>t.yg===yg && t.role==='Class').forEach(t=>{
        result.push({id:id++, day:dayIdx, session, endSession, tid:t.id,
          reason, reasonNote:'', cover:null, nocover:false});
      });
      return;
    }
    // Individual teacher by name
    const t=TEACHERS.find(t=>t.name===r.Teacher);
    if (!t) return;
    result.push({id:id++, day:dayIdx, session, endSession, tid:t.id,
      reason, reasonNote:'', cover:null, nocover:t.isInfoOnly||false});
  });
  return result;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function currentWeekIdx() {
  const today=new Date(); today.setHours(0,0,0,0);
  for (let i=0;i<WEEKS.length;i++) {
    const end=new Date(WEEKS[i].start); end.setDate(end.getDate()+4);
    if (today<=end) return i;
  }
  return Math.max(0,WEEKS.length-1);
}
async function init() {
  document.getElementById('centerPane').innerHTML=
    '<div style="padding:60px;text-align:center;color:#94a3b8;font-size:14px">Loading from Google Sheets…</div>';
  try {
    const cacheBuster = `&_cb=${Date.now()}`;
    const get=tab=>fetch(SHEET_BASE+encodeURIComponent(tab)+cacheBuster).then(r=>{if(!r.ok)throw new Error(tab);return r.text();});
    const [staffTxt,termsTxt,eventsTxt,wseTxt,recTxt]=await Promise.all([
      get('Staff'),get('TermDates'),get('CalendarEvents'),get('EventsMeetings'),get('RecurringCover')
    ]);
    const {teachers,cover}=buildStaff(csvToObjects(staffTxt));
    TEACHERS=teachers; COVER=cover;
    WEEKS=buildWeeks(csvToObjects(termsTxt));
    const {blocking,info,sessionInfo}=buildEvents(csvToObjects(eventsTxt));
    EVENTS=blocking; INFO_EVENTS=info; SESSION_INFO_EVENTS=sessionInfo;
    WS_SHEET_DEFAULTS=buildSchoolEvents(csvToObjects(wseTxt));
    wsEvents=wsLoad();
    RECURRING_SLOTS=buildRecurring(csvToObjects(recTxt));
    // Restore saved planner state, falling back to recurring slots for current week
    const saved=await stateLoad();
    if (saved) {
      state.weekSlots=saved.weekSlots||{};
      state.cellNotes=saved.cellNotes||{};
      state.nextId=saved.nextId||200;
    }
    state.weekIdx=currentWeekIdx();
    if (!state.weekSlots[state.weekIdx] || state.weekSlots[state.weekIdx].length===0) state.weekSlots[state.weekIdx]=JSON.parse(JSON.stringify(RECURRING_SLOTS));
    render();
  } catch(err) {
    document.getElementById('centerPane').innerHTML=
      `<div style="padding:40px;text-align:center;color:#dc2626;font-size:14px">⚠ Could not load sheet data: ${err.message}<br><small style="color:#94a3b8">Check the sheet is published (File → Share → Publish to web)</small></div>`;
    console.error(err);
  }
}

// ── State persistence ─────────────────────────────────────────────────────────
function stateSave() {
  const json = JSON.stringify({ weekSlots: state.weekSlots, cellNotes: state.cellNotes, nextId: state.nextId });
  try { localStorage.setItem('wfa_planner_state', json); } catch(e) {}
  fetch(SYNC_URL, { method:'POST', body:json }).catch(()=>{});
}
async function stateLoad() {
  try {
    const res = await fetch(SYNC_URL);
    const remote = await res.json();
    if (remote) { localStorage.setItem('wfa_planner_state', JSON.stringify(remote)); return remote; }
  } catch(e) {}
  try { const s = localStorage.getItem('wfa_planner_state'); return s ? JSON.parse(s) : null; }
  catch(e) { return null; }
}

// ── Notification helpers ───────────────────────────────────────────────────────
function staffEmail(name) {
  const t = TEACHERS.find(t => t.name === name);
  if (t && t.email) return t.email;
  const c = COVER.find(c => c.name === name);
  if (c && c.email) return c.email;
  return '';
}
function staffYG(name) {
  const t = TEACHERS.find(t => t.name === name);
  return t?.yg || '';
}
function logChange(type, slot) {
  const teacherName = slot.tid ? (teacher(slot.tid)?.name || '') : (slot.teacherName || '');
  state.changeLog.push({
    type,
    teacherName,
    teacherYG: staffYG(teacherName),
    coverName: slot.cover || '',
    day: slot.day !== undefined ? DAYS[slot.day] : '',
    session: slot.session || '',
    reason: slot.reason || '',
    week: WEEKS[state.weekIdx]?.label || '',
    timestamp: Date.now()
  });
  updateNotifyBadge();
}
function updateNotifyBadge() {
  const badge = document.getElementById('notifyBadge');
  if (badge) badge.textContent = state.changeLog.length || '';
  const btn = document.getElementById('notifyBtn');
  if (btn) btn.classList.toggle('has-changes', state.changeLog.length > 0);
}

function slots()        { return state.weekSlots[state.weekIdx] || []; }
function setSlots(arr)  { state.weekSlots[state.weekIdx] = arr; stateSave(); }
function teacher(tid)   { return TEACHERS.find(t => t.id === tid); }
function rbCls(r)       { return 'rb-' + (REASON_CLS[r] || 'Other'); }
function sygCls(yg)     { return yg ? 'syg-' + yg : ''; }
function pipCls(yg)     { return 'pip-' + (yg || ''); }
function dotCls(yg)     { return 'dot-' + (yg || ''); }
const YG_COLOURS = {Reception:'#dbeafe',Y1:'#ffedd5',Y2:'#d1fae5',Y3:'#fce7f3',Y4:'#bfdbfe',Y5:'#fed7aa',Y6:'#bbf7d0'};
function ygCol(yg)      { return YG_COLOURS[yg] || '#e2e8f0'; }

function maxEnt(t) { return t.ent.reduce((s,e) => s + e.n, 0); }
function teacherUsageCount(tid) { return slots().filter(s => s.tid === tid && COUNTED_SESSIONS.has(s.session)).length; }
function coverByName(name) { return COVER.find(c => c.name.toLowerCase() === (name||'').toLowerCase()); }

// Per-reason usage count for a teacher this week (fortnightly ents also check previous week)
function teacherReasonUsed(tid) {
  const used = {};
  slots().filter(s => s.tid === tid && COUNTED_SESSIONS.has(s.session))
    .forEach(s => { used[s.reason] = (used[s.reason]||0)+1; });
  const t = teacher(tid);
  if (t && state.weekIdx > 0) {
    const prev = state.weekSlots[state.weekIdx-1] || [];
    t.ent.filter(e => e.freq === 'fortnightly').forEach(e => {
      const n = prev.filter(s => s.tid===tid && s.reason===e.r && COUNTED_SESSIONS.has(s.session)).length;
      if (n > 0) used[e.r] = (used[e.r]||0) + n;
    });
  }
  return used;
}

// First entitlement reason that still has capacity, or 'Other' if all used
function firstAvailableReason(tid) {
  const t = teacher(tid);
  if (!t) return 'Other';
  const used = teacherReasonUsed(tid);
  const avail = t.ent.find(e => (used[e.r]||0) < e.n);
  return avail?.r || 'Other';
}

function reasonOptions(tid, current) {
  const t = teacher(tid);
  if (!t) return `<option value="Other"${current==='Other'?' selected':''}>Other</option>`;
  if (t.isLeader) {
    const opts = [...(t.reasons || []), 'Other'];
    return opts.map(r => `<option value="${r}"${r===current?' selected':''}>${r}</option>`).join('');
  }
  const used = teacherReasonUsed(tid);
  const opts = [];
  t.ent.forEach(e => {
    const remaining = e.n - (used[e.r]||0);
    if (remaining > 0 || e.r === current) {
      const suffix = remaining <= 0 ? ' ✓' : e.n > 1 ? ` (${remaining} left)` : '';
      opts.push(`<option value="${e.r}"${e.r===current?' selected':''}>${e.r}${suffix}</option>`);
    }
  });
  opts.push(`<option value="Other"${current==='Other'?' selected':''}>Other</option>`);
  return opts.join('');
}

function allNames() {
  const names = new Set();
  slots().forEach(s => {
    const t = teacher(s.tid);
    if (t) names.add(t.name);
    if (s.cover) names.add(s.cover);
  });
  return [...names].sort();
}

function fmtDay(dayIdx, weekStart) {
  const d = new Date(weekStart); d.setDate(d.getDate() + dayIdx);
  return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
}

function getDayEvent(weekIdx, dayIdx) {
  const w = WEEKS[weekIdx];
  if (!w) return null;
  const d = new Date(w.start); d.setDate(w.start.getDate() + dayIdx);
  return EVENTS[dateKey(d)] || null;
}
function getDayInfoEvents(weekIdx, dayIdx) {
  const w = WEEKS[weekIdx];
  if (!w) return [];
  const d = new Date(w.start); d.setDate(w.start.getDate() + dayIdx);
  return INFO_EVENTS[dateKey(d)] || [];
}
function getSessionInfoEvents(weekIdx, dayIdx, session) {
  const w = WEEKS[weekIdx];
  if (!w) return [];
  const d = new Date(w.start); d.setDate(w.start.getDate() + dayIdx);
  return SESSION_INFO_EVENTS[`${dateKey(d)}|${session}`] || [];
}

  renderWeekLabel();

  document.getElementById('tab-week').classList.toggle('active', state.view === 'week');

}

function renderWeekLabel() {
  const w = WEEKS[state.weekIdx];
  if (!w) { document.getElementById('weekLabel').innerHTML = '—'; return; }
  const end = new Date(w.start); end.setDate(w.start.getDate() + 4);
  const fmt = d => d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  document.getElementById('weekLabel').innerHTML = `<div>${w.label}</div><small>${fmt(w.start)} – ${fmt(end)}</small>`;
  document.getElementById('prevWeek').disabled = state.weekIdx === 0;
  document.getElementById('nextWeek').disabled = state.weekIdx === WEEKS.length - 1;
}

function renderStats() {
  const coverSlots = slots().filter(s => !s.nocover);
  const total = coverSlots.length, covered = coverSlots.filter(s=>s.cover).length, tbc = total - covered;
  const pct = total > 0 ? Math.round(covered/total*100) : 100;
  const bar = `<div style="width:${Math.min(pct,100)}%;height:6px;background:${tbc===0?'#22c55e':'#1798d3'};border-radius:3px;transition:width .3s"></div>`;
  const canCopy = state.weekIdx < WEEKS.length - 1;
  document.getElementById('statsContent').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#e2e8f0"></div><span><strong>${total}</strong> sessions out</span></div>
    <div class="stat"><div class="stat-dot" style="background:#22c55e"></div><span><strong>${covered}</strong> covered</span></div>
    <div class="stat"><div class="stat-dot" style="background:#ef4444"></div><span><strong>${tbc}</strong> TBC</span></div>
    <div class="stat" style="flex:1">
      <div style="flex:1;max-width:180px;background:#e2e8f0;border-radius:3px;overflow:hidden">${bar}</div>
      <span style="color:#1e3a8a;font-weight:bold;margin-left:6px">${pct}%</span>
    </div>
    <div class="stat" style="gap:6px">
      <button class="action-btn" onclick="copyToNextWeek()" ${canCopy?'':'disabled'}>Copy → next week</button>
      <button class="action-btn danger" onclick="resetWeek()">Reset week</button>
    </div>`;
}

function renderStaff() {
  const classTeachers = TEACHERS.filter(t => !t.isInfoOnly);
  const leaders = TEACHERS.filter(t => t.isInfoOnly);

  let html = `<div class="section-label">Teachers</div>`;

  classTeachers.forEach(t => {
    const usedMap = teacherReasonUsed(t.id);
    const totalSlots = teacherUsageCount(t.id);
    const namedTotal = maxEnt(t);
    const allNamedDone = t.ent.length > 0 && t.ent.every(e => (usedMap[e.r]||0) >= e.n);
    const dragging = state.dragging?.type === 'teacher' && state.dragging.id === t.id;

    let entItems = '';
    t.ent.forEach(e => {
      const usedN = usedMap[e.r] || 0;
      let pips = '';
      for (let i = 0; i < e.n; i++)     pips += `<div class="ent-mini ${i < usedN ? 'used' : 'empty'}"></div>`;
      for (let i = e.n; i < usedN; i++) pips += `<div class="ent-mini over"></div>`;
      entItems += `<span class="chip-ent-item">${e.r} ${pips}</span>`;
    });
    const extraCount = Math.max(0, totalSlots - namedTotal);
    if (extraCount > 0) {
      let xp = '';
      for (let i = 0; i < extraCount; i++) xp += `<div class="ent-mini over"></div>`;
      entItems += `<span class="chip-ent-item">extra ${xp}</span>`;
    }

    html += `<div class="teacher-chip ${dragging?'dragging':''}"
      onpointerdown="onTeacherPointerDown(event,'${t.id}')">
      <div class="chip-row1">
        <div class="yg-pip ${pipCls(t.yg)}"></div>
        <span class="chip-name">${t.name}</span>
        ${allNamedDone ? `<div class="chip-done" title="All named entitlements scheduled">✓</div>` : ''}
      </div>
      ${entItems ? `<div class="chip-row2">${entItems}</div>` : ''}
    </div>`;
  });

  if (leaders.length) {
    html += `<div class="section-label" style="margin-top:14px">Non-Class Based</div>`;
    leaders.forEach(t => {
      const dragging = state.dragging?.type === 'teacher' && state.dragging.id === t.id;
      const usedMap = teacherReasonUsed(t.id);
      const allNamedDone = t.ent.length > 0 && t.ent.every(e => (usedMap[e.r]||0) >= e.n);
      let entItems = '';
      t.ent.forEach(e => {
        const usedN = usedMap[e.r]||0;
        let pips = '';
        for (let i=0;i<e.n;i++) pips+=`<div class="ent-mini ${i<usedN?'used':'empty'}"></div>`;
        for (let i=e.n;i<usedN;i++) pips+=`<div class="ent-mini over"></div>`;
        entItems += `<span class="chip-ent-item">${e.r} ${pips}</span>`;
      });
      html += `<div class="teacher-chip ${dragging?'dragging':''}"
        onpointerdown="onTeacherPointerDown(event,'${t.id}')">
        <div class="chip-row1">
          <div class="yg-pip" style="background:#94a3b8"></div>
          <span class="chip-name">${t.name}</span>
          ${allNamedDone ? `<div class="chip-done" title="All named entitlements scheduled">✓</div>` : ''}
        </div>
        ${entItems ? `<div class="chip-row2">${entItems}</div>` : ''}
      </div>`;
    });
  }

  document.getElementById('staffPanel').innerHTML = html;
}

function renderCoverStaff() {

function renderGrid() {
  const w = WEEKS[state.weekIdx];
  const isDragTeacher = state.dragging?.type === 'teacher';
  const isDragSlot    = state.dragging?.type === 'slot';
  const isDragCover   = state.dragging?.type === 'cover';

  // Build slot lookup - include slots that span multiple sessions
  const slotMap = {};
  DAYS.forEach((_,i) => { slotMap[i] = {}; SESSIONS.forEach(s => { slotMap[i][s] = []; }); });
  slots().forEach(s => {
    const startIdx = SESSION_IDX[s.session] ?? 0;
    const endIdx = SESSION_IDX[s.endSession] ?? startIdx;
    // Add slot to each session it spans
    for (let i = startIdx; i <= endIdx; i++) {
      slotMap[s.day][SESSIONS[i]].push(s);
    }
  });

  let html = `<thead><tr>
    <th></th>
    ${DAYS.map((d,i) => {
      const dt = new Date(w.start); dt.setDate(w.start.getDate()+i);
      const ev = getDayEvent(state.weekIdx, i);
      const infoEvs = getDayInfoEvents(state.weekIdx, i);
      const evHtml = ev ? `<div class="event-day-header ${ev.type==='inset'?'inset':''}">${ev.type==='bank-holiday'?'🏦':'📋'} ${ev.label}</div>` : '';
      const infoHtml = infoEvs.map(e=>`<div class="event-day-header" style="color:#7c3aed">📌 ${e.label}</div>`).join('');
      const hasSlots = (state.weekSlots[state.weekIdx]||[]).some(s => s.day === i);
      const resetBtn = hasSlots && !ev ? `<button class="day-reset-btn" onclick="resetDay(${i})" title="Clear ${d}">✕</button>` : '';
      return `<th style="position:relative">${d.slice(0,3)}<br><span style="font-size:10px;font-weight:normal;opacity:.7">${dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>${evHtml}${infoHtml}${resetBtn}</th>`;
    }).join('')}
  </tr></thead><tbody>`;

  const SESSION_ROW_CLS = {'Before School':'srow-before','AM':'srow-am','Lunch':'srow-lunch','PM':'srow-pm','After School':'srow-after'};
  SESSIONS.forEach((session, sessionIdx) => {
    const isOffAlloc = OFF_ALLOC.has(session);
    const rowCls = SESSION_ROW_CLS[session] || '';
    html += `<tr class="${rowCls}" data-session-idx="${sessionIdx}"><td class="session-cell">${SESSION_SHORT[session]}</td>`;
    DAYS.forEach((_,dayIdx) => {
      const ev = getDayEvent(state.weekIdx, dayIdx);
      if (ev) {
        const isCls = ev.type === 'inset' ? 'inset' : '';
        html += `<td class="grid-cell event-blocked ${isCls}"></td>`;
        return;
      }

      const cellSlots = slotMap[dayIdx][session];
      const hasTBC = cellSlots.some(s => !s.cover && !s.nocover);
      let readyCls = '';
      if (isDragTeacher || isDragSlot) readyCls = 'teacher-ready';
      else if (isDragCover && hasTBC)  readyCls = 'cover-ready';

      html += `<td class="grid-cell ${readyCls}"
        data-day="${dayIdx}" data-session="${session}">`;

      // Collect all session events (wsEvents + session info events)
      const wsEventMatches = wsEvents.filter(e => e.day === dayIdx && e.session === session);
      const sessionInfoEvents = getSessionInfoEvents(state.weekIdx, dayIdx, session);
      const allEvents = [...wsEventMatches, ...sessionInfoEvents];

      // Before School and After School use horizontal banners; AM/Lunch/PM use vertical strips
      const isShortRow = session === 'Before School' || session === 'After School';
      const hasEvents = allEvents.length > 0;

      if (hasEvents) {
        const ev = allEvents[0];
        const bg = ev.bg || '#7c3aed';
        if (isShortRow) {
          // Horizontal banner for short rows
          html += `<div class="session-banner" style="background:${bg};color:${contrastColor(bg)}">${ev.label}</div>`;
        } else {
          // Vertical strip for AM/Lunch/PM
          html += `<div class="event-strip">
            <div class="event-strip-content" style="background:${bg};color:${contrastColor(bg)}">
              <div class="event-strip-text">${ev.label}</div>
            </div>
          </div>`;
        }
      }

      // Per-cell notes (user-added) - keep horizontal for now
      const noteKey = `${state.weekIdx}-${dayIdx}-${session}`;
      const cellNote = state.cellNotes[noteKey];
      if (cellNote) {
        html += `<div class="cell-note">
          <span style="flex:1">${cellNote}</span>
          <button class="note-del" onclick="removeCellNote('${noteKey}')">×</button>
        </div>`;
      }

      // Horizontal layout: slots side by side (adjusted for event strip in tall rows)
      if (cellSlots.length > 0) {
        const hasVerticalEvent = hasEvents && !isShortRow;
        html += `<div class="slots-row" ${hasVerticalEvent ? 'style="left:25px"' : ''}>`;
        cellSlots.forEach(s => {
          const t = teacher(s.tid);
          const yg = t?.yg || null;
          const draggingThis = state.dragging?.type === 'slot' && state.dragging.slotId === s.id;

          // Determine span position
          const startIdx = SESSION_IDX[s.session] ?? 0;
          const endIdx = SESSION_IDX[s.endSession ?? s.session] ?? startIdx;
          const currentIdx = SESSION_IDX[session] ?? 0;
          const isFirst = currentIdx === startIdx;
          const isLast = currentIdx === endIdx;
          const hasSpan = endIdx > startIdx;

          const col = ygCol(yg);
          const cv = coverByName(s.cover);

          // Full UI only in first session of span
          if (isFirst) {
            // For spans, just show placeholder - full content rendered via overlay
            if (hasSpan) {
              html += `<div class="slot-item ${sygCls(yg)}" style="visibility:hidden;"></div>`;
            } else {
              // Single-session slot: render in-cell
              const cv = coverByName(s.cover);
              html += `<div class="slot-item ${sygCls(yg)} ${s.nocover?'nocover-slot':''} ${draggingThis?'slot-dragging':''}">
                <div class="slot-content" style="border-left-color:${col}" onpointerdown="onSlotPointerDown(event,${s.id})">
                  <button class="slot-del" onclick="removeSlot(${s.id});event.stopPropagation()" title="Delete bar">✕</button>
                  <div class="slot-text">
                    ${s.cover ? `<span class="slot-cover-name"><span class="slot-avatar" style="background:${cv?.col||'#94a3b8'}">${cv?.init||s.cover.slice(0,2).toUpperCase()}</span> ${s.cover} <span class="slot-cover-x" onpointerdown="event.stopPropagation();event.preventDefault();unassignCover(${s.id})">✕</span></span><span class="slot-gap"></span>` : ''}
                    <span class="slot-name">${t ? t.name : s.tid}</span>
                    <span class="slot-gap"></span>
                    <span class="slot-reason">${s.reason}</span>
                  </div>
                  ${s.nocover ? '' : s.cover ? '' : `<div class="slot-cover-zone" data-slot="${s.id}">+ TBC</div>`}
                  <div class="slot-extend" onpointerdown="onExtendPointerDown(event,${s.id})"></div>
                </div>
              </div>`;
            }
          } else {
            // Continuation cell - placeholder for alignment (content rendered via overlay)
            html += `<div class="slot-item ${sygCls(yg)}"></div>`;
          }
        });
        html += `</div>`;
      }

      if (cellSlots.length === 0 && !hasEvents && !cellNote) {
        html += `<div class="empty-hint">＋</div>`;
      }
      html += `</td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody>`;

  // Collect spans for overlay rendering
  const spans = [];
  slots().forEach(s => {
    const startIdx = SESSION_IDX[s.session] ?? 0;
    const endIdx = SESSION_IDX[s.endSession ?? s.session] ?? startIdx;
    if (endIdx > startIdx) {
      spans.push({ slot: s, startIdx, endIdx });
    }
  });

  document.getElementById('centerPane').innerHTML = `<div class="grid-wrap"><table class="week-grid">${html}</table><div class="span-strips" id="spanStrips"></div></div>`;

  // Position spanning strips after DOM is ready
  requestAnimationFrame(() => positionSpanStrips(spans));
}

function positionSpanStrips(spans) {
  const container = document.getElementById('spanStrips');
  if (!container) return;
  container.innerHTML = '';

  const rows = document.querySelectorAll('.week-grid tbody tr');
  if (!rows.length) return;

  const rowTops = [], rowBottoms = [];
  rows.forEach(row => {
    const rect = row.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();
    rowTops.push(rect.top - containerRect.top);
    rowBottoms.push(rect.bottom - containerRect.top);
  });

  spans.forEach(({ slot: s, startIdx, endIdx }) => {
    const t = teacher(s.tid);
    const yg = t?.yg || null;
    const col = ygCol(yg);
    const cv = coverByName(s.cover);

    // Find the correct position by checking ALL cells the span passes through
    // We need to find the maximum index this slot has among all cells it spans
    let maxSlotIndex = 0;
    let anyCellHasEvent = false;

    for (let idx = startIdx; idx <= endIdx; idx++) {
      const session = SESSIONS[idx];
      if (session === 'Before School' || session === 'After School') continue; // Skip short rows for position calculation

      // Check for event in this cell
      const wsEv = wsEvents.find(e => e.day === s.day && e.session === session);
      const sessEv = getSessionInfoEvents(state.weekIdx, s.day, session);
      if (wsEv || sessEv.length > 0) {
        anyCellHasEvent = true;
      }

      // Find all slots in this cell (including spans that pass through)
      const cellSlots = (state.weekSlots[state.weekIdx] || []).filter(sl => {
        const slStart = SESSION_IDX[sl.session] ?? 0;
        const slEnd = SESSION_IDX[sl.endSession ?? sl.session] ?? slStart;
        // Slot is in this cell if it spans this session
        return sl.day === s.day && slStart <= idx && idx <= slEnd;
      });
      const slotIdx = cellSlots.findIndex(sl => sl.id === s.id);
      if (slotIdx > maxSlotIndex) {
        maxSlotIndex = slotIdx;
      }
    }

    // Get base position from first cell's geometry
    const firstCell = document.querySelector(`td[data-day="${s.day}"][data-session="${SESSIONS[startIdx]}"]`);
    if (!firstCell) return;

    const firstSlotItems = firstCell.querySelectorAll('.slot-item');
    const firstCellSlots = (state.weekSlots[state.weekIdx] || []).filter(sl => {
      const slStart = SESSION_IDX[sl.session] ?? 0;
      return sl.day === s.day && slStart === startIdx;
    });
    const firstSlotIdx = firstCellSlots.findIndex(sl => sl.id === s.id);

    // Use a slot item from the first cell to get width
    const baseSlotItem = firstSlotItems[0];
    if (!baseSlotItem) return;

    const containerRect = container.getBoundingClientRect();
    const baseSlotItemRect = baseSlotItem.getBoundingClientRect();
    const slotWidth = baseSlotItemRect.width;
    const gap = 3; // gap between slot items

    // Calculate left position: base + (index * (width + gap)) + event offset if needed
    // Event offset = difference between slots-row left with event (25px) and without (5px) = 20px
    const firstSession = SESSIONS[startIdx];
    const firstRowHasEvent = wsEvents.some(e => e.day === s.day && e.session === firstSession) ||
                              getSessionInfoEvents(state.weekIdx, s.day, firstSession).length > 0;
    const eventOffset = (!firstRowHasEvent && anyCellHasEvent) ? 20 : 0;

    // Use the first cell's left as base, then add offset for maxSlotIndex
    const baseLeft = baseSlotItemRect.left - containerRect.left + eventOffset;
    const left = baseLeft + maxSlotIndex * (slotWidth + gap);
    const top = rowTops[startIdx];
    const bottom = rowBottoms[endIdx];
    const height = bottom - top;

    console.log('Creating overlay slot at left:', left, 'top:', top, 'height:', height, 'width:', slotWidth, 'maxSlotIndex:', maxSlotIndex);

    const slotHtml = `<div class="slot-item ${sygCls(yg)} ${s.nocover?'nocover-slot':''}" style="position:absolute;left:${left}px;top:${top}px;width:${slotWidth}px;height:${height}px;">
      <div class="slot-content" style="height:${height}px;border-left-color:${col}" onpointerdown="onSlotPointerDown(event,${s.id})">
        <button class="slot-del" onclick="removeSlot(${s.id});event.stopPropagation()" title="Delete bar">✕</button>
        <div class="slot-text">
          ${s.cover ? `<span class="slot-cover-name"><span class="slot-avatar" style="background:${cv?.col||'#94a3b8'}">${cv?.init||s.cover.slice(0,2).toUpperCase()}</span> ${s.cover} <span class="slot-cover-x" onpointerdown="event.stopPropagation();event.preventDefault();unassignCover(${s.id})">✕</span></span><span class="slot-gap"></span>` : ''}
          <span class="slot-name">${t ? t.name : s.tid}</span>
          <span class="slot-gap"></span>
          <span class="slot-reason">${s.reason}</span>
        </div>
        ${s.nocover ? '' : s.cover ? '' : `<div class="slot-cover-zone" data-slot="${s.id}">+ TBC</div>`}
        <div class="slot-extend" onpointerdown="onExtendPointerDown(event,${s.id})"></div>
      </div>
    </div>`;

    container.insertAdjacentHTML('beforeend', slotHtml);
  });
}

// ── Pointer drag ──────────────────────────────────────────────────────────────
let ptrDrag = null;

function ptrGhostCreate(sourceEl) {
  ptrGhostRemove();
  const el = sourceEl.cloneNode(true);
  el.id = 'drag-ghost';
  el.style.cssText = `position:fixed;z-index:9999;pointer-events:none;opacity:.85;box-shadow:0 6px 20px rgba(0,0,0,.25);width:${sourceEl.offsetWidth}px;margin:0;top:0;left:0;will-change:transform;`;
  document.body.appendChild(el);
  return el;
}
function ptrGhostMove(x, y) {
  const el = document.getElementById('drag-ghost');
  if (el) el.style.transform = `translate(${x+14}px,${y-18}px)`;
}
function ptrGhostRemove() { document.getElementById('drag-ghost')?.remove(); }

function ptrCellAt(x, y) {
  for (const el of document.elementsFromPoint(x, y)) {
    if (el.dataset.day !== undefined && el.dataset.session !== undefined)
      return { dayIdx: +el.dataset.day, session: el.dataset.session, el };
  }
  return null;
}
function ptrSlotZoneAt(x, y) {
  for (const el of document.elementsFromPoint(x, y)) {
    if (el.classList?.contains('slot-cover-zone')) return { slotId: +el.dataset.slot, el };
  }
  return null;
}

let ptrLastHL = null;
function ptrHL(el, cls) {
  if (ptrLastHL) { ptrLastHL.el.classList.remove(ptrLastHL.cls); ptrLastHL = null; }
  if (el) { el.classList.add(cls); ptrLastHL = { el, cls }; }
}

document.addEventListener('pointermove', e => {
  // Handle extend drag
  if (extendDrag) {
    const rowIdx = getSessionRowAt(e.clientX, e.clientY);
    // Map row index to session (rows are in SESSIONS order)
    if (rowIdx >= 0 && rowIdx < SESSIONS.length) {
      const newEndIdx = Math.max(extendDrag.startSessionIdx, rowIdx);
      if (newEndIdx !== extendDrag.currentEndIdx) {
        const s = slots().find(x => x.id === extendDrag.slotId);
        if (s) {
          s.endSession = SESSIONS[newEndIdx];
          extendDrag.currentEndIdx = newEndIdx;
          stateSave();
          render();
        }
      }
    }
    return;
  }

  if (!ptrDrag) return;
  if (!ptrDrag.active) {
    const dx = e.clientX - ptrDrag.startX, dy = e.clientY - ptrDrag.startY;
    if (Math.hypot(dx, dy) < 8) return;
    ptrDrag.active = true;
    ptrGhostCreate(ptrDrag.sourceEl);
    state.dragging = ptrDrag.info;
    render();
  }
  ptrGhostMove(e.clientX, e.clientY);
  const d = ptrDrag.info;
  if (d.type === 'cover') {
    const zone = ptrSlotZoneAt(e.clientX, e.clientY);
    ptrHL(zone?.el || null, 'over');
  } else {
    const cell = ptrCellAt(e.clientX, e.clientY);
    ptrHL(cell?.el || null, d.type === 'slot' ? 'slot-over' : 'teacher-over');
  }
});

function ptrCommitDrop(x, y) {
  if (!ptrDrag?.active) return;
  const d = ptrDrag.info;
  if (d.type === 'cover') {
    const zone = ptrSlotZoneAt(x, y);
    if (zone) {
      const s = slots().find(x => x.id === zone.slotId);
      if (s && !s.cover) { s.cover = d.name; logChange('assign_cover', s); stateSave(); }
    }
  } else {
    const cell = ptrCellAt(x, y);
    if (cell) {
      const { dayIdx, session } = cell;
      if (d.type === 'teacher') {
        if (!getDayEvent(state.weekIdx, dayIdx) &&
            !slots().find(s => s.tid === d.id && s.day === dayIdx && s.session === session)) {
          const t = teacher(d.id);
          if (!t?.workingDays || t.workingDays.includes(dayIdx)) {
            const isLeader = t?.isLeader || false;
            if (isLeader) {
              // Leaders use first reason directly
              const reason = t.reasons?.[0] || 'Meeting';
              const newSlot = { id: state.nextId++, day: dayIdx, session, endSession: session, tid: d.id, reason, reasonNote: '', cover: null, nocover: t?.isInfoOnly || false };
              setSlots([...slots(), newSlot]);
              logChange('add', newSlot);
            } else {
              // Check available entitlements
              const used = teacherReasonUsed(d.id);
              const available = (t.ent || []).filter(e => (used[e.r]||0) < e.n);
              if (available.length > 1) {
                // Show popup for reason selection
                showReasonPopup(d.id, dayIdx, session, available, used, x, y);
                return; // Don't clear drag yet - popup is showing
              } else {
                // Single or no entitlement - use first available
                const reason = available[0]?.r || firstAvailableReason(d.id);
                const newSlot = { id: state.nextId++, day: dayIdx, session, endSession: session, tid: d.id, reason, reasonNote: '', cover: null, nocover: t?.isInfoOnly || false };
                setSlots([...slots(), newSlot]);
                logChange('add', newSlot);
              }
            }
          }
        }
      } else if (d.type === 'slot') {
        if (!getDayEvent(state.weekIdx, dayIdx)) {
          const s = slots().find(x => x.id === d.slotId);
          if (s) { s.day = dayIdx; s.session = session; s.endSession = session; logChange('move', s); stateSave(); }
        }
      }
    }
  }
}

document.addEventListener('pointerup', e => {
  if (extendDrag) {
    extendDrag = null;
    return;
  }
  if (!ptrDrag) return;
  ptrCommitDrop(e.clientX, e.clientY);
  ptrGhostRemove();
  ptrHL(null);
  ptrDrag = null;
  state.dragging = null;
  render();
});

document.addEventListener('pointercancel', () => {
  if (extendDrag) { extendDrag = null; return; }
  ptrGhostRemove();
  ptrHL(null);
  ptrDrag = null;
  state.dragging = null;
  render();
});

function startPtrDrag(e, info) {
  if (document.body.classList.contains('edit-locked')) return;
  if (e.target.closest('button, select, input')) return;
  e.preventDefault();
  ptrDrag = { info, sourceEl: e.currentTarget, startX: e.clientX, startY: e.clientY, active: false };
}

function onTeacherPointerDown(e, tid) {
  startPtrDrag(e, { type: 'teacher', id: tid });
}
function onCoverPointerDown(e, cid, name) {
  startPtrDrag(e, { type: 'cover', id: cid, name });
}
function onSlotPointerDown(e, slotId) {
  e.stopPropagation();
  startPtrDrag(e, { type: 'slot', slotId });
}

// ── Extend drag (drag bottom edge to extend span) ─────────────────────────────────
let extendDrag = null; // { slotId, startEndIdx, startDayIdx }

function onExtendPointerDown(e, slotId) {
  if (document.body.classList.contains('edit-locked')) return;
  e.stopPropagation();
  e.preventDefault();
  const s = slots().find(x => x.id === slotId);
  if (!s) return;
  const startIdx = SESSION_IDX[s.session] ?? 0;
  const endIdx = SESSION_IDX[s.endSession] ?? startIdx;
  extendDrag = {
    slotId,
    startSessionIdx: startIdx,
    currentEndIdx: endIdx,
    startY: e.clientY
  };
}

function getSessionRowAt(x, y) {
  const rows = document.querySelectorAll('.week-grid tbody tr');
  for (const row of rows) {
    const rect = row.getBoundingClientRect();
    if (y >= rect.top && y < rect.bottom) {
      return parseInt(row.dataset.sessionIdx, 10);
    }
  }
  return -1;
}

// ── Mutations ─────────────────────────────────────────────────────────────────

function removeSlot(slotId) {
  const s = slots().find(x => x.id === slotId);
  if (s) logChange('remove', s);
  setSlots(slots().filter(s => s.id !== slotId));
  render();
}
function unassignCover(slotId) { const s = slots().find(x => x.id === slotId); if (s) { logChange('unassign_cover', s); s.cover = null; stateSave(); render(); } }
function changeReason(slotId, reason) { const s = slots().find(x => x.id === slotId); if (s) { logChange('change_reason', s); s.reason = reason; if (reason !== 'Other') s.reasonNote = ''; stateSave(); render(); } }
function changeReasonNote(slotId, note) { const s = slots().find(x => x.id === slotId); if (s) { s.reasonNote = note; stateSave(); } }
function changeEndSession(slotId, endSession) {
  const s = slots().find(x => x.id === slotId);
  if (s) {
    const startIdx = SESSION_IDX[s.session] ?? 0;
    const endIdx = SESSION_IDX[endSession] ?? startIdx;
    if (endIdx >= startIdx) {
      s.endSession = endSession;
      logChange('extend', s);
      stateSave(); render();
    }
  }
}
function changeWeek(dir) {
  state.weekIdx = Math.max(0, Math.min(WEEKS.length-1, state.weekIdx+dir));
  if (!state.weekSlots[state.weekIdx] || state.weekSlots[state.weekIdx].length===0)
    state.weekSlots[state.weekIdx] = JSON.parse(JSON.stringify(RECURRING_SLOTS));
  render();
}
function setView(v)            { state.view = v; document.body.classList.toggle('present-mode', v==='present'); render(); }
function setMyName(n)          { state.myName = n; render(); }

function showReasonPopup(tid, dayIdx, session, available, used, x, y) {
  state.pendingDrop = { tid, dayIdx, session };
  const t = teacher(tid);
  let html = '<div class="reason-popup" id="reasonPopup" style="left:' + x + 'px;top:' + y + 'px;" onclick="event.stopPropagation()">';
  available.forEach(e => {
    const remaining = e.n - (used[e.r]||0);
    html += `<div class="reason-popup-item" onclick="selectReason('${e.r}')">${e.r} <span style="color:#94a3b8">${remaining} left</span></div>`;
  });
  html += `<div class="reason-popup-item" onclick="selectReason('Other')">Other</div>`;
  html += '</div>';
  document.body.insertAdjacentHTML('beforeend', html);

  // Close popup when clicking outside
  setTimeout(() => {
    document.addEventListener('click', closeReasonPopup, { once: true });
  }, 0);
}

function selectReason(reason) {
  if (!state.pendingDrop) return;
  const { tid, dayIdx, session } = state.pendingDrop;
  const t = teacher(tid);
  const newSlot = { id: state.nextId++, day: dayIdx, session, endSession: session, tid, reason, reasonNote: '', cover: null, nocover: t?.isInfoOnly || false };
  setSlots([...slots(), newSlot]);
  logChange('add', newSlot);
  closeReasonPopup();
}

function closeReasonPopup() {
  state.pendingDrop = null;
  const popup = document.getElementById('reasonPopup');
  if (popup) popup.remove();
  // Clear the drag state that was paused
  ptrDrag = null;
  state.dragging = null;
  render();
}

function addCellNote(key) {
  const existing = state.cellNotes[key] || '';
  const text = prompt('Add a note for this session:', existing);
  if (text === null) return; // cancelled
  if (text.trim()) state.cellNotes[key] = text.trim();
  else delete state.cellNotes[key];
  stateSave();
  render();
}
function removeCellNote(key) {
  delete state.cellNotes[key];
  stateSave();
  render();
}

function resetDay(dayIdx) {
  if (!confirm(`Clear all slots for ${DAYS[dayIdx]}? This cannot be undone.`)) return;
  const daySlots = slots().filter(s => s.day === dayIdx);
  daySlots.forEach(s => logChange('remove', s));
  setSlots(slots().filter(s => s.day !== dayIdx));
  render();
}
function resetWeek() {
  if (!confirm(`Reset ${WEEKS[state.weekIdx].label} to recurring slots only? This cannot be undone.`)) return;
  slots().forEach(s => logChange('remove', s));
  setSlots(JSON.parse(JSON.stringify(RECURRING_SLOTS)));
  render();
}
function copyToNextWeek() {
  const nextIdx = state.weekIdx + 1;
  if (nextIdx >= WEEKS.length) return;
  if ((state.weekSlots[nextIdx]||[]).length > 0) {
    if (!confirm('Next week already has entries — replace with a copy of this week?')) return;
  }
  state.weekSlots[nextIdx] = slots().map(s => ({...s, id:state.nextId++}));
  state.weekIdx = nextIdx;
  logChange('copy_week', { tid: '', cover: '', day: '', session: '', reason: '' });
  render();
}

// ── Notification panel ──────────────────────────────────────────────────────────

const CHANGE_LABELS = {
  add: 'Added',
  remove: 'Removed',
  assign_cover: 'Cover assigned',
  unassign_cover: 'Cover unassigned',
  change_reason: 'Reason changed',
  move: 'Moved',
  extend: 'Extended',
  copy_week: 'Copied to next week',
  reset_day: 'Day reset',
  reset_week: 'Week reset'
};

function toggleNotifyPanel() {
  const overlay = document.getElementById('notifyOverlay');
  if (overlay.classList.contains('hidden')) {
    overlay.classList.remove('hidden');
    renderNotifyPanel();
  } else {
    overlay.classList.add('hidden');
  }
}

function closeNotifyPanel(e) {
  if (e && e.target !== document.getElementById('notifyOverlay')) return;
  document.getElementById('notifyOverlay').classList.add('hidden');
}

function clearChangeLog() {
  state.changeLog = [];
  updateNotifyBadge();
  renderNotifyPanel();
}

function renderNotifyPanel() {
  const body = document.getElementById('notifyPanelBody');
  const actions = document.getElementById('notifyActions');
  const sendBtn = document.getElementById('notifySendBtn');

  if (state.changeLog.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:30px 10px;color:#94a3b8;font-size:14px">No changes to notify about yet.<br><small>Changes you make will appear here.</small></div>';
    actions.style.display = 'none';
    return;
  }

  actions.style.display = 'flex';

  // Determine affected year groups and recipients
  const affectedYGs = new Set();
  const recipientsByEmail = {};
  state.changeLog.forEach(ch => {
    if (ch.teacherYG) affectedYGs.add(ch.teacherYG);
    if (ch.coverName) {
      const coverYG = staffYG(ch.coverName);
      if (coverYG) affectedYGs.add(coverYG);
    }
  });

  // Build recipients: all staff in affected YGs + directly involved cover staff
  TEACHERS.forEach(t => {
    if (affectedYGs.has(t.yg) && t.email) {
      recipientsByEmail[t.email] = t.name;
    }
  });
  COVER.forEach(c => {
    // Cover staff directly involved in a change
    const involved = state.changeLog.some(ch => ch.coverName === c.name);
    if (involved && c.email) {
      recipientsByEmail[c.email] = c.name;
    }
  });

  // Group changes by year group
  const changesByYG = {};
  state.changeLog.forEach(ch => {
    const ygs = [];
    if (ch.teacherYG) ygs.push(ch.teacherYG);
    if (ch.coverName) {
      const coverYG = staffYG(ch.coverName);
      if (coverYG) ygs.push(coverYG);
    }
    if (ygs.length === 0) ygs.push('Other');
    ygs.forEach(yg => {
      if (!changesByYG[yg]) changesByYG[yg] = [];
      changesByYG[yg].push(ch);
    });
  });

  const YG_COLOURS_NOTIFY = { Reception:'#dbeafe',Y1:'#ffedd5',Y2:'#d1fae5',Y3:'#fce7f3',Y4:'#bfdbfe',Y5:'#fed7aa',Y6:'#bbf7d0' };

  let html = '';

  // Recipients section
  html += '<div class="notify-recipients">';
  html += `<h4>Will notify ${Object.keys(recipientsByEmail).length} staff member${Object.keys(recipientsByEmail).length !== 1 ? 's' : ''}</h4>`;
  html += '<div class="email-list">';
  Object.entries(recipientsByEmail).forEach(([email, name]) => {
    html += `<div>${name} <span style="color:#94a3b8">&lt;${email}&gt;</span></div>`;
  });
  html += '</div></div>';

  // Changes grouped by year group
  html += '<h4 style="font-size:12px;color:#64748b;margin:0 0 8px">Changes</h4>';
  Object.entries(changesByYG).forEach(([yg, changes]) => {
    const col = YG_COLOURS_NOTIFY[yg] || '#e2e8f0';
    html += `<div class="notify-yg-group">`;
    html += `<div class="notify-yg-label"><span class="yg-dot" style="background:${col}"></span>${yg}</div>`;
    changes.forEach(ch => {
      const label = CHANGE_LABELS[ch.type] || ch.type;
      const teacherName = ch.teacherName || 'Unknown';
      const coverName = ch.coverName || '';
      const detail = coverName
        ? `${teacherName} ${ch.type === 'assign_cover' ? '←' : '→'} ${coverName}`
        : teacherName;
      html += `<div class="notify-change">
        <div class="ch-type">${label}</div>
        <div class="ch-detail">${detail} <span style="color:#94a3b8">${ch.day} ${ch.session}</span></div>
      </div>`;
    });
    html += '</div>';
  });

  body.innerHTML = html;
  sendBtn.disabled = Object.keys(recipientsByEmail).length === 0;
}

async function sendNotification() {
  if (state.changeLog.length === 0) return;

  const sendBtn = document.getElementById('notifySendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending…';

  // Determine affected year groups and recipients
  const affectedYGs = new Set();
  const recipients = [];
  const seen = new Set();

  state.changeLog.forEach(ch => {
    if (ch.teacherYG) affectedYGs.add(ch.teacherYG);
    if (ch.coverName) {
      const coverYG = staffYG(ch.coverName);
      if (coverYG) affectedYGs.add(coverYG);
    }
  });

  TEACHERS.forEach(t => {
    if (affectedYGs.has(t.yg) && t.email && !seen.has(t.email)) {
      seen.add(t.email);
      recipients.push({ name: t.name, email: t.email, yg: t.yg });
    }
  });
  COVER.forEach(c => {
    const involved = state.changeLog.some(ch => ch.coverName === c.name);
    if (involved && c.email && !seen.has(c.email)) {
      seen.add(c.email);
      recipients.push({ name: c.name, email: c.email, yg: staffYG(c.name) || 'Cover' });
    }
  });

  if (recipients.length === 0) {
    sendBtn.textContent = 'No recipients';
    setTimeout(() => { sendBtn.textContent = 'Send notifications'; sendBtn.disabled = false; }, 2000);
    return;
  }

  const payload = {
    changes: state.changeLog,
    weekLabel: WEEKS[state.weekIdx]?.label || '',
    weekStart: WEEKS[state.weekIdx]?.start?.toISOString() || '',
    timestamp: Date.now(),
    affectedYGs: [...affectedYGs],
    recipients: recipients.map(r => ({ name: r.name, email: r.email, yg: r.yg }))
  };

  try {
    await fetch(NOTIFY_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
  } catch(e) {
    // CORS error expected — the request still reaches the server
  }

  // Show success
  const body = document.getElementById('notifyPanelBody');
  const actions = document.getElementById('notifyActions');
  body.innerHTML = `<div class="notify-sent">
    <div style="font-size:40px;margin-bottom:10px">✓</div>
    <h3>Notifications sent!</h3>
    <p>${recipients.length} staff member${recipients.length !== 1 ? 's' : ''} across ${affectedYGs.size} year group${affectedYGs.size !== 1 ? 's' : ''} will be notified.</p>
  </div>`;
  actions.style.display = 'none';

  // Clear change log
  state.changeLog = [];
  updateNotifyBadge();

  // Auto-close after 3 seconds
  setTimeout(() => {
    document.getElementById('notifyOverlay').classList.add('hidden');
  }, 3000);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
