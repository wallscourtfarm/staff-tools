<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Labels — Wallscourt Farm Academy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @font-face {
      font-family: 'Tw Cen MT';
      src: url('Tw Cen MT.ttf') format('truetype');
    }
    :root {
      --blue: #2a7fc1;
      --blue-dk: #1a5c8e;
      --blue-lt: #e8f2fb;
      --gold: #e6a817;
      --green: #3a9e5f;
      --bg: #e8eef4;
      --white: #ffffff;
      --border: #d0dce8;
      --text: #1e2d3d;
      --muted: #7a8fa3;
      --label: #4a6278;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
    .top-bar { height: 5px; background: var(--blue); }
    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    header img { height: 80px; width: auto; object-fit: contain; }
    .header-divider { width: 1px; height: 64px; background: var(--border); margin: 0 4px; flex-shrink: 0; }
    .header-text h1 { color: var(--blue); font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
    .header-text p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .school-name { color: var(--text); font-size: 1.1rem; font-weight: 600; line-height: 1.3; }
    main { flex: 1; display: flex; justify-content: center; padding: 28px 16px 48px; }
    .panel { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--white); border-radius: 10px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .card-header { padding: 11px 18px; background: var(--blue-lt); border-bottom: 1px solid var(--border); }
    .card-header h2 { font-size: 0.78rem; font-weight: 700; color: var(--blue-dk); text-transform: uppercase; letter-spacing: 0.06em; }
    .card-body { padding: 16px 18px; }
    .field { margin-bottom: 11px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--label); margin-bottom: 4px; }
    .field select, .field input { width: 100%; font-family: inherit; font-size: 0.875rem; border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 11px; background: var(--white); color: var(--text); }
    .field select:focus, .field input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(42,127,193,0.12); }
    textarea { width: 100%; font-family: inherit; font-size: 0.875rem; border: 1.5px solid var(--border); border-radius: 6px; padding: 8px 11px; background: var(--white); color: var(--text); resize: vertical; min-height: 100px; }
    textarea:focus { outline: none; border-color: var(--blue); }
    .hint { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    .mode-tabs { display: flex; flex-wrap: wrap; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border); }
    .mode-tab { flex: 1; min-width: 80px; padding: 10px 8px; font-size: 0.7rem; font-weight: 700; cursor: pointer; background: var(--white); border: none; color: var(--muted); font-family: inherit; transition: background 0.15s, color 0.15s; text-transform: uppercase; letter-spacing: 0.03em; }
    .mode-tab:hover:not(.active) { background: var(--blue-lt); color: var(--blue-dk); }
    .mode-tab.active { background: var(--blue); color: var(--white); }

    .year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .year-btn { padding: 10px 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; background: var(--white); border: 2px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; transition: all 0.15s; }
    .year-btn:hover { border-color: var(--blue); }
    .year-btn.active { border-color: var(--blue); background: var(--blue); color: var(--white); }
    .year-btn[data-colour="blue"].active { background: #3288ce; border-color: #3288ce; }
    .year-btn[data-colour="orange"].active { background: #f57721; border-color: #f57721; }
    .year-btn[data-colour="green"].active { background: #63b44a; border-color: #63b44a; }
    .year-btn[data-colour="magenta"].active { background: #c1126d; border-color: #c1126d; }

    .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; margin-top: 8px; font-size: 0.85rem; color: var(--text); display: block; }
    .upload-area:hover { border-color: var(--blue); background: var(--blue-lt); }
    .upload-area input { position: absolute; opacity: 0; width: 0; height: 0; }
    .upload-area:focus-within { outline: 2px solid var(--blue); outline-offset: 2px; }

    .btn-dl { width: 100%; background: var(--gold); color: var(--white); border: none; border-radius: 7px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 2px 6px rgba(230,168,23,0.3); transition: background 0.15s; }
    .btn-dl:hover:not(:disabled) { background: #cb9210; }
    .btn-dl:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; box-shadow: none; }
    .status { text-align: center; font-size: 0.85rem; color: var(--green); margin-top: 8px; min-height: 16px; font-weight: 600; }
    .status.error { color: #c0392b; }

    .preview-box { background: #f5f5f5; border-radius: 8px; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 320px; }
    .label-preview { width: 139mm; height: 99.1mm; position: relative; overflow: hidden; background: #3288ce; }
    .white-box { position: absolute; background: white; top: 13.05mm; left: 15.5mm; width: 108mm; height: 73mm; font-family: 'Tw Cen MT', Arial, sans-serif; }

    .all-labels-checkbox { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 0.85rem; color: var(--text); cursor: pointer; }
    .all-labels-checkbox input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--blue); }

    footer { text-align: center; color: var(--muted); font-size: 0.7rem; padding: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="top-bar"></div>
<header>
  <img src="logo.png" alt="WFA">
  <div class="header-divider"></div>
  <div>
    <div class="school-name">Wallscourt Farm Academy</div>
    <h1 class="header-text">Book Labels</h1>
    <p>Avery L7169 — 4 per sheet (139 × 99.1mm)</p>
  </div>
</header>
<main>
  <div class="panel">
    <div class="card">
      <div class="card-header"><h2>Label Type</h2></div>
      <div class="card-body">
        <div class="mode-tabs" id="labelTypeTabs">
          <button class="mode-tab active" data-type="learning-journey">Learning Journey</button>
          <button class="mode-tab" data-type="maths-book">Maths Book</button>
          <button class="mode-tab" data-type="home-learning">Home Learning</button>
          <button class="mode-tab" data-type="artist">Artist</button>
          <button class="mode-tab" data-type="writers-journal">Writer's Journal</button>
          <button class="mode-tab" data-type="maths-journal">Maths Journal</button>
        </div>
        <label class="all-labels-checkbox">
          <input type="checkbox" id="allLabels"> Generate all label types for each child
        </label>
      </div>
    </div>

    <div class="card" id="yearGroupCard">
      <div class="card-header"><h2>Year Group</h2></div>
      <div class="card-body">
        <div class="year-grid" id="yearGrid">
          <button class="year-btn" data-year="R" data-zone="Oak" data-colour="blue">R</button>
          <button class="year-btn" data-year="1" data-zone="Beech" data-colour="orange">Y1</button>
          <button class="year-btn" data-year="2" data-zone="Willow" data-colour="green">Y2</button>
          <button class="year-btn" data-year="3" data-zone="Acer" data-colour="magenta">Y3</button>
          <button class="year-btn" data-year="4" data-zone="Maple" data-colour="blue">Y4</button>
          <button class="year-btn" data-year="5" data-zone="Hazel" data-colour="orange">Y5</button>
          <button class="year-btn" data-year="6" data-zone="Elm" data-colour="green">Y6</button>
        </div>
        <p class="hint">Select year group to set colour and Learning Zone</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Book Number (Optional)</h2></div>
      <div class="card-body">
        <input type="number" id="bookNumber" placeholder="1" min="1" max="99" style="width:60px;text-align:center;">
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Children's Names</h2></div>
      <div class="card-body">
        <textarea id="namesInput" placeholder="Enter names, one per line"></textarea>
        <label class="upload-area">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv,.txt">
          <div>📄 Click to upload class list (Excel, CSV, or TXT)</div>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Preview</h2></div>
      <div class="card-body">
        <div class="preview-box">
          <div class="label-preview" id="labelPreview"></div>
        </div>
        <div id="labelCount" style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:8px;"></div>
      </div>
    </div>

    <button class="btn-dl" id="dlBtn">↓ Download Labels (PDF)</button>
    <div class="status" id="status"></div>
  </div>
</main>
<footer>Wallscourt Farm Academy — Book Label Generator</footer>

<script>
// Year group colours
const YEAR_COLOURS = {
  'R': { hex: '#3288ce', zone: 'Oak' },
  '1': { hex: '#f57721', zone: 'Beech' },
  '2': { hex: '#63b44a', zone: 'Willow' },
  '3': { hex: '#c1126d', zone: 'Acer' },
  '4': { hex: '#3288ce', zone: 'Maple' },
  '5': { hex: '#f57721', zone: 'Hazel' },
  '6': { hex: '#63b44a', zone: 'Elm' }
};

// Label type config
const LABEL_TYPES = {
  'learning-journey': { title: "My Learning Journey", hasZone: true, iconType: 'stob', showLogo: true },
  'home-learning': { title: "Home Learning", hasZone: true, iconType: 'stob', showLogo: true },
  'writers-journal': { title: "Writer's Journal", hasZone: true, iconType: 'stob', showLogo: true },
  'maths-book': { title: "Mathematician", hasZone: true, iconType: 'maths', showLogo: true },
  'maths-journal': { title: "Maths Journal", hasZone: true, iconType: 'maths', showLogo: true },
  'artist': { title: "Artist", hasZone: false, iconType: 'artist', greyBorder: true, showLogo: true }
};

// State
let currentLabelType = 'learning-journey';
let currentYear = null;
let names = [];
let bookNumber = '';
let allLabelsMode = false;

// DOM elements
let labelTypeTabs, yearGrid, yearGroupCard, namesInput, fileInput;
let dlBtn, statusEl, bookNumberInput, labelPreview, labelCount, allLabelsCheckbox;

// Images (loaded as base64 for PDF)
let schoolLogoData = null;
let stobData = null;
let mathsData = null;
let artistData = null;
let fontBase64 = null;

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', init);

async function init() {
  // Get DOM elements
  labelTypeTabs = document.getElementById('labelTypeTabs');
  yearGrid = document.getElementById('yearGrid');
  yearGroupCard = document.getElementById('yearGroupCard');
  namesInput = document.getElementById('namesInput');
  fileInput = document.getElementById('fileInput');
  dlBtn = document.getElementById('dlBtn');
  statusEl = document.getElementById('status');
  bookNumberInput = document.getElementById('bookNumber');
  labelPreview = document.getElementById('labelPreview');
  labelCount = document.getElementById('labelCount');
  allLabelsCheckbox = document.getElementById('allLabels');

  // Load images and font
  await Promise.all([loadImages(), loadFont()]);

  // Set up event listeners
  labelTypeTabs.addEventListener('click', onLabelTypeClick);
  yearGrid.addEventListener('click', onYearClick);
  namesInput.addEventListener('input', onNamesInput);
  bookNumberInput.addEventListener('input', onBookNumberInput);
  fileInput.addEventListener('change', onFileUpload);
  dlBtn.addEventListener('click', generatePdf);
  allLabelsCheckbox.addEventListener('change', onAllLabelsChange);

  // Initial preview
  updatePreview();
}

function onAllLabelsChange() {
  allLabelsMode = allLabelsCheckbox.checked;
  // Disable tab clicks when in all-labels mode
  labelTypeTabs.querySelectorAll('.mode-tab').forEach(tab => {
    tab.style.opacity = allLabelsMode ? '0.5' : '1';
    tab.style.pointerEvents = allLabelsMode ? 'none' : 'auto';
  });
  updatePreview();
}

async function loadImages() {
  const imgs = [
    ['schoollogo-book.png', 'schoolLogoData'],
    ['book-stob-lj.png', 'stobData'],
    ['maths-book.png', 'mathsData'],
    ['artist-book.png', 'artistData']
  ];

  for (const [src, prop] of imgs) {
    try {
      const response = await fetch(src);
      const blob = await response.blob();
      const dataUrl = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
      // Assign to the correct variable
      if (prop === 'schoolLogoData') schoolLogoData = dataUrl;
      else if (prop === 'stobData') stobData = dataUrl;
      else if (prop === 'mathsData') mathsData = dataUrl;
      else if (prop === 'artistData') artistData = dataUrl;
    } catch (e) {
      console.warn(`Could not load ${src}`);
    }
  }
}

async function loadFont() {
  try {
    const response = await fetch('Tw Cen MT.ttf');
    const blob = await response.blob();
    fontBase64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.readAsDataURL(blob);
    });
  } catch (e) {
    console.warn('Could not load font');
  }
}

function onLabelTypeClick(e) {
  if (!e.target.classList.contains('mode-tab')) return;

  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentLabelType = e.target.dataset.type;

  if (LABEL_TYPES[currentLabelType].greyBorder) {
    yearGroupCard.classList.add('hidden');
  } else {
    yearGroupCard.classList.remove('hidden');
  }

  updatePreview();
}

function onYearClick(e) {
  if (!e.target.classList.contains('year-btn')) return;

  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentYear = e.target.dataset.year;
  updatePreview();
}

function onNamesInput() {
  const text = namesInput.value.trim();
  names = text ? text.split('\n').map(n => n.trim()).filter(n => n) : [];
  updatePreview();
}

function onBookNumberInput() {
  bookNumber = bookNumberInput.value.trim();
  updatePreview();
}

async function onFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  try {
    if (ext === 'xlsx' || ext === 'xls') {
      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      names = rows.flat().filter(cell => {
        if (typeof cell !== 'string') return false;
        const c = cell.trim().toLowerCase();
        return c && !['first name', 'firstname', 'name', 'names'].includes(c);
      });
    } else {
      const text = await file.text();
      names = text.split(/[\n\r,]+/).map(n => n.trim()).filter(n => n);
    }
    namesInput.value = names.join('\n');
    updatePreview();
  } catch (err) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Error reading file';
    setTimeout(() => { statusEl.textContent = ''; statusEl.className = 'status'; }, 3000);
  }
}

function updatePreview() {
  const labelType = LABEL_TYPES[currentLabelType];
  const yearData = currentYear ? YEAR_COLOURS[currentYear] : null;
  const previewName = names.length > 0 ? names[0] : '[Name]';
  const bgColour = labelType.greyBorder ? '#808080' : (yearData?.hex || '#ccc');

  // Preview uses mm units to match PDF exactly
  // White box: 108mm x 73mm, centred in label (15.5mm from left, 13.05mm from top)
  // Artist label has different positions (no zone, more space)

  const isArtist = currentLabelType === 'artist';
  const nameTop = isArtist ? '8mm' : '14mm';
  const titleTop = isArtist ? '20mm' : '26mm';
  const logoTop = isArtist ? '30mm' : '34mm';

  let html = `
    <div style="position:absolute;inset:0;background:${bgColour};">
      <div class="white-box">`;

  // States of Being overlay (centred horizontally, 2mm from top of white box)
  if (labelType.iconType === 'stob' && stobData) {
    html += `<img src="${stobData}" style="position:absolute;top:2mm;left:50%;transform:translateX(-50%);width:105mm;height:67mm;object-fit:contain;">`;
  }

  // Book number (top right of white box, 2mm from edges)
  if (bookNumber) {
    html += `<div style="position:absolute;top:2mm;right:2mm;font-family:'Tw Cen MT',Arial,sans-serif;font-size:11pt;font-weight:bold;">${bookNumber}</div>`;
  }

  // Name (centred) - 28pt font
  html += `<div style="position:absolute;top:${nameTop};left:0;right:0;text-align:center;font-family:'Tw Cen MT',Arial,sans-serif;font-size:28pt;font-weight:bold;text-decoration:underline;">${previewName}</div>`;

  // Book name (centred) - 22pt font
  html += `<div style="position:absolute;top:${titleTop};left:0;right:0;text-align:center;font-family:'Tw Cen MT',Arial,sans-serif;font-size:22pt;font-weight:bold;">${labelType.title}</div>`;

  // School logo (centred)
  if (labelType.showLogo && schoolLogoData) {
    html += `<img src="${schoolLogoData}" style="position:absolute;top:${logoTop};left:50%;transform:translateX(-50%);width:40mm;height:17.4mm;object-fit:contain;">`;
  }

  // Maths icon (top left of white box)
  if (labelType.iconType === 'maths' && mathsData) {
    html += `<img src="${mathsData}" style="position:absolute;top:2mm;left:2mm;width:16mm;height:12mm;object-fit:contain;">`;
  }

  // Artist icon (centred near bottom)
  if (labelType.iconType === 'artist' && artistData) {
    html += `<img src="${artistData}" style="position:absolute;bottom:8mm;left:50%;transform:translateX(-50%);width:20mm;height:16mm;object-fit:contain;">`;
  }

  // Learning Zone (if applicable)
  if (labelType.hasZone && yearData) {
    // Zone name (centred, 54mm from top) - 18pt font
    html += `<div style="position:absolute;top:54mm;left:0;right:0;text-align:center;font-family:'Tw Cen MT',Arial,sans-serif;font-size:18pt;font-weight:bold;">${yearData.zone}</div>`;
    // "Learning Zone" label (centred, 60mm from top) - 12pt font
    html += `<div style="position:absolute;top:60mm;left:0;right:0;text-align:center;font-family:'Tw Cen MT',Arial,sans-serif;font-size:12pt;color:#666;">Learning Zone</div>`;
  }

  html += `</div></div>`;

  labelPreview.innerHTML = html;

  // Update button state
  const needsYear = !labelType.greyBorder && !allLabelsMode;
  dlBtn.disabled = names.length === 0 || (needsYear && !currentYear);

  // Update count
  if (allLabelsMode) {
    const totalLabels = names.length * 6; // 6 label types per child
    const sheets = Math.ceil(totalLabels / 4);
    labelCount.textContent = names.length > 0 ? `${names.length} child${names.length > 1 ? 'ren' : ''} × 6 labels → ${totalLabels} labels → ${sheets} sheet${sheets > 1 ? 's' : ''}` : '';
  } else {
    const sheets = Math.ceil(names.length / 4);
    labelCount.textContent = names.length > 0 ? `${names.length} names → ${sheets} sheet${sheets > 1 ? 's' : ''} (4 per sheet)` : '';
  }
}

async function generatePdf() {
  const { jsPDF } = window.jspdf;

  // Define label types order for "all labels" mode
  const ALL_LABEL_TYPES = ['learning-journey', 'maths-book', 'home-learning', 'artist', 'writers-journal', 'maths-journal'];

  // Get label types to generate
  const typesToGenerate = allLabelsMode
    ? ALL_LABEL_TYPES
    : [currentLabelType];

  // Get year data
  const yearData = currentYear ? YEAR_COLOURS[currentYear] : null;

  statusEl.className = 'status';
  statusEl.textContent = 'Building…';
  dlBtn.disabled = true;

  try {
    // A4 LANDSCAPE: 297mm x 210mm
    // Avery L7169: 4 labels per sheet (2x2), each 139 x 99.1mm
    const WHITE_W = 108;
    const WHITE_H = 73;
    const BORDER_L = (139 - 108) / 2;  // 15.5mm
    const BORDER_T = (99.1 - 73) / 2;   // 13.05mm

    // Label positions
    const labelPositions = [
      { x: 9.5, y: 5.4 },                         // top-left
      { x: 9.5 + 139, y: 5.4 },                   // top-right
      { x: 9.5, y: 5.4 + 99.1 },                  // bottom-left
      { x: 9.5 + 139, y: 5.4 + 99.1 }             // bottom-right
    ];

    // Build list of labels to generate
    // In all-labels mode: each child gets all 6 label types
    // In single mode: each child gets the selected label type
    const labelsToGenerate = [];
    for (const name of names) {
      for (const typeKey of typesToGenerate) {
        labelsToGenerate.push({ name, typeKey });
      }
    }

    // Fill to complete sheets
    const sheetsNeeded = Math.ceil(labelsToGenerate.length / 4) || 1;
    while (labelsToGenerate.length < sheetsNeeded * 4) {
      labelsToGenerate.push(null);
    }

    // Create PDF
    const doc = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4'
    });

    // Add Tw Cen MT font
    if (fontBase64) {
      doc.addFileToVFS('TwCenMT.ttf', fontBase64);
      doc.addFont('TwCenMT.ttf', 'TwCenMT', 'normal');
    }

    // Convert hex to RGB
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return [r, g, b];
    }

    const fontName = fontBase64 ? 'TwCenMT' : 'helvetica';

    for (let sheetIdx = 0; sheetIdx < sheetsNeeded; sheetIdx++) {
      if (sheetIdx > 0) doc.addPage();

      const sheetLabels = labelsToGenerate.slice(sheetIdx * 4, (sheetIdx + 1) * 4);

      for (let i = 0; i < 4; i++) {
        const labelData = sheetLabels[i];
        const pos = labelPositions[i];

        if (!labelData) continue;

        const { name, typeKey } = labelData;
        const labelType = LABEL_TYPES[typeKey];
        const labelYearData = labelType.hasZone ? yearData : null;
        const bgColour = labelType.greyBorder ? '#808080' : (labelYearData?.hex || '#ccc');
        const [r, g, b] = hexToRgb(bgColour);

        // Fill label background
        doc.setFillColor(r, g, b);
        doc.rect(pos.x, pos.y, 139, 99.1, 'F');

        // Draw white box
        doc.setFillColor(255, 255, 255);
        doc.rect(pos.x + BORDER_L, pos.y + BORDER_T, WHITE_W, WHITE_H, 'F');

        const innerX = pos.x + BORDER_L;
        const innerY = pos.y + BORDER_T;

        // States of Being overlay
        if (labelType.iconType === 'stob' && stobData) {
          const stobW = 105;
          const stobH = 67;
          const stobL = innerX + (WHITE_W - stobW) / 2;
          doc.addImage(stobData, 'PNG', stobL, innerY + 2, stobW, stobH);
        }

        // Book number (top right)
        if (bookNumber) {
          doc.setFont(fontName, 'normal');
          doc.setFontSize(11);
          doc.setTextColor(0, 0, 0);
          const numW = doc.getTextWidth(bookNumber);
          doc.text(bookNumber, innerX + WHITE_W - 4 - numW, innerY + 6);
        }

        // Positions vary by label type
        const isArtist = typeKey === 'artist';
        const nameTop = isArtist ? 8 : 14;
        const titleTop = isArtist ? 20 : 26;
        const logoTop = isArtist ? 30 : 34;

        // Name
        doc.setFont(fontName, 'normal');
        doc.setFontSize(28);
        doc.setTextColor(0, 0, 0);
        const nameW = doc.getTextWidth(name);
        const nameY = innerY + nameTop + 7.4;
        doc.text(name, innerX + (WHITE_W - nameW) / 2, nameY);
        doc.setDrawColor(0);
        doc.setLineWidth(0.5);
        doc.line(innerX + (WHITE_W - nameW) / 2, nameY + 1, innerX + (WHITE_W + nameW) / 2, nameY + 1);

        // Book name
        doc.setFont(fontName, 'normal');
        doc.setFontSize(22);
        const titleW = doc.getTextWidth(labelType.title);
        doc.text(labelType.title, innerX + (WHITE_W - titleW) / 2, innerY + titleTop + 5.8);

        // School logo
        if (labelType.showLogo && schoolLogoData) {
          const logoW = 40;
          const logoH = 17.4;
          const logoL = innerX + (WHITE_W - logoW) / 2;
          doc.addImage(schoolLogoData, 'PNG', logoL, innerY + logoTop, logoW, logoH);
        }

        // Maths icon
        if (labelType.iconType === 'maths' && mathsData) {
          const iconW = 16;
          const iconH = 12;
          doc.addImage(mathsData, 'PNG', innerX + 2, innerY + 2, iconW, iconH);
        }

        // Artist icon
        if (labelType.iconType === 'artist' && artistData) {
          const iconW = 20;
          const iconH = 16;
          const iconL = innerX + (WHITE_W - iconW) / 2;
          doc.addImage(artistData, 'PNG', iconL, innerY + WHITE_H - 22, iconW, iconH);
        }

        // Learning Zone
        if (labelType.hasZone && labelYearData) {
          doc.setFont(fontName, 'normal');
          doc.setFontSize(18);
          const zoneW = doc.getTextWidth(labelYearData.zone);
          doc.text(labelYearData.zone, innerX + (WHITE_W - zoneW) / 2, innerY + 54 + 4.8);

          doc.setFont(fontName, 'normal');
          doc.setFontSize(12);
          doc.setTextColor(102, 102, 102);
          const lzW = doc.getTextWidth('Learning Zone');
          doc.text('Learning Zone', innerX + (WHITE_W - lzW) / 2, innerY + 60 + 3.2);
        }
      }
    }

    const filename = allLabelsMode
      ? `WFA_Book_Labels_All6Types_${currentYear || 'NoYear'}.pdf`
      : `WFA_Book_Labels_${currentLabelType.replace(/-/g, '_')}_${currentYear || 'Artist'}.pdf`;
    doc.save(filename);

    statusEl.textContent = '✓ Downloaded';
    setTimeout(() => { statusEl.textContent = ''; dlBtn.disabled = false; updatePreview(); }, 3000);

  } catch (e) {
    console.error(e);
    statusEl.className = 'status error';
    statusEl.textContent = 'Error: ' + e.message;
    dlBtn.disabled = false;
  }
}
</script>
</body>
</html>
