<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Label Test</title>
  <style>
    @font-face {
      font-family: 'Tw Cen MT';
      src: url('Tw Cen MT.ttf') format('truetype');
    }
    body {
      background: #3288ce; /* Year 4 blue */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .page {
      width: 297mm;
      height: 210mm;
      position: relative;
      background: #3288ce;
    }
    .label {
      position: absolute;
      top: 5.4mm;
      left: 9.5mm;
      width: 139mm;
      height: 99.1mm;
    }
    .white-box {
      position: absolute;
      /* Centred in label: (139-108)/2 = 15.5mm from left, (99.1-73)/2 = 13.05mm from top */
      top: 13.05mm;
      left: 15.5mm;
      width: 108mm;
      height: 73mm;
      background: white;
    }
    .stob-overlay {
      /* States of Being PNG: spread out wider, centred horizontally */
      position: absolute;
      top: 2mm;
      left: 50%;
      transform: translateX(-50%);
      width: 105mm;
      height: 67mm;
    }
    .stob-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .name {
      /* Moved down to avoid States of Being icons - larger font */
      position: absolute;
      top: 15mm;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Tw Cen MT', Arial, sans-serif;
      font-size: 24pt;
      font-weight: bold;
      text-decoration: underline;
      text-align: center;
      white-space: nowrap;
    }
    .book-name {
      /* Immediately below name, centred - larger font */
      position: absolute;
      top: 28mm;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Tw Cen MT', Arial, sans-serif;
      font-size: 18pt;
      font-weight: bold;
      text-align: center;
      white-space: nowrap;
    }
    .school-logo {
      /* 0.17cm gap below book name, centred, 1.74cm x 4cm */
      position: absolute;
      top: 38mm;
      left: 50%;
      transform: translateX(-50%);
      width: 40mm;
      height: 17.4mm;
    }
    .school-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .zone-name {
      /* Immediately below logo, centred - larger font */
      position: absolute;
      top: 56mm;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Tw Cen MT', Arial, sans-serif;
      font-size: 16pt;
      font-weight: bold;
      text-align: center;
    }
    .zone-label {
      /* Immediately below zone name, centred */
      position: absolute;
      top: 62mm;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Tw Cen MT', Arial, sans-serif;
      font-size: 11pt;
      color: #666;
      text-align: center;
    }
    .book-number {
      /* Top right of white box, 0.8cm x 0.8cm */
      position: absolute;
      top: 2mm;
      right: 2mm;
      font-family: 'Tw Cen MT', Arial, sans-serif;
      font-size: 11pt;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="label">
      <div class="white-box">
        <!-- States of Being overlay with transparent background -->
        <div class="stob-overlay">
          <img src="book-stob-lj.png" alt="States of Being">
        </div>

        <!-- Name (centred) -->
        <div class="name">Amir</div>

        <!-- Book name (centred) -->
        <div class="book-name">My Learning Journey</div>

        <!-- School logo (centred) -->
        <div class="school-logo">
          <img src="schoollogo-book.png" alt="School Logo">
        </div>

        <!-- Learning Zone name (centred) -->
        <div class="zone-name">Maple</div>

        <!-- Learning Zone label (centred) -->
        <div class="zone-label">Learning Zone</div>

        <!-- Book number (top right) -->
        <div class="book-number">3</div>
      </div>
    </div>
  </div>
</body>
</html>
